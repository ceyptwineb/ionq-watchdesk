[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[functions."watch-ionq"]
  schedule = "*/15 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store"
