[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# 通知チェックの間隔。毎分(* * * * *)だと多すぎるため5分おきに変更。
# 速報性を上げたいなら "*/3 * * * *"(3分) などに、戻すなら "* * * * *"。
[functions."watch-ionq"]
  schedule = "*/5 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store"
