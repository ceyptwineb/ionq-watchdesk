[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# 通知チェックの間隔。速報性重視で5分おき（月間約8,640回、無料枠125,000回の7%程度）。
# 抑えるなら "*/10 * * * *"(10分) や "*/15 * * * *"(15分)。
[functions."watch-ionq"]
  schedule = "*/5 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store"
