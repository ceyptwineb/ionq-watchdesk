[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# 通知チェックの間隔。Netlify使用量を抑えるため10分おき。
# 速報性を上げるなら "*/5 * * * *"(5分)、さらに抑えるなら "*/15 * * * *"(15分)。
[functions."watch-ionq"]
  schedule = "*/10 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store"
