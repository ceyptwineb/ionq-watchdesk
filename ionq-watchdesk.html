<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IONQ Watchdesk</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #ffffff;
      --line: #d9ded6;
      --text: #17201b;
      --muted: #68736c;
      --accent: #0d766e;
      --accent-soft: #dff2ee;
      --warn: #9b5a00;
      --danger: #a23434;
      --good: #167046;
      --shadow: 0 10px 24px rgba(20, 34, 28, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 11px;
      cursor: pointer;
    }

    button:hover { border-color: var(--accent); }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 390px minmax(0, 1fr);
    }

    .feed {
      border-right: 1px solid var(--line);
      background: #fbfcfa;
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .feed-head {
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .status {
      color: var(--muted);
      font-size: 12px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .tab {
      padding: 7px 4px;
      font-size: 12px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: #064d47;
      font-weight: 700;
    }

    .tools {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .search {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      min-width: 0;
    }

    .items {
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 7px;
    }

    .item.active {
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }

    .item-title {
      font-weight: 700;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 1px 7px;
      background: #f7f8f5;
    }

    .item-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .posted {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
    }

    .detail {
      min-width: 0;
      padding: 18px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 14px;
      height: 100vh;
    }

    .selected {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .selected h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .selected-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .read-box {
      background: #f9faf7;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .read-ok { color: var(--good); font-weight: 700; }
    .read-ng { color: var(--danger); font-weight: 700; }

    .report-area {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 14px;
    }

    .draft-panel, .side-panel {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .panel-head {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .panel-head strong { font-size: 14px; }

    textarea {
      width: 100%;
      height: 100%;
      min-height: 380px;
      resize: none;
      border: 0;
      padding: 14px;
      outline: 0;
      line-height: 1.65;
      background: #fff;
      color: var(--text);
    }

    .side-content {
      padding: 12px;
      overflow: auto;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfa;
    }

    .metric b { display: block; margin-bottom: 4px; }
    .metric span { color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }

    .empty {
      padding: 22px;
      color: var(--muted);
      text-align: center;
    }

    .warn {
      color: var(--warn);
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .feed {
        position: static;
        height: auto;
        max-height: 58vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .detail {
        height: auto;
        min-height: 70vh;
        padding: 12px;
      }
      .report-area { grid-template-columns: 1fr; }
      .side-panel { grid-template-rows: auto auto; }
      textarea { min-height: 420px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="feed">
      <div class="feed-head">
        <div class="brand">
          <h1>IONQ Watchdesk</h1>
          <span id="updated" class="status">起動中</span>
        </div>
        <div class="tabs" id="tabs"></div>
        <div class="tools">
          <input id="search" class="search" type="search" placeholder="検索">
          <button id="reload" title="更新">更新</button>
        </div>
      </div>
      <div id="items" class="items"></div>
    </section>

    <section class="detail">
      <div id="selected" class="selected">
        <div class="empty">左の速報を選ぶと、記事本文を読んで深掘りレポートを作れます。</div>
      </div>

      <div class="read-box">
        <div id="readStatus" class="status">本文取得はまだ実行していません。</div>
        <div class="selected-row">
          <button id="testRead">本文取得テスト</button>
          <button id="makeReport" class="primary">深掘りレポート生成</button>
          <button id="copyDraft">コピー</button>
          <button id="openX">Xで開く</button>
        </div>
      </div>

      <div class="report-area">
        <section class="draft-panel">
          <div class="panel-head">
            <strong>投稿案</strong>
            <span id="charCount" class="status">0文字</span>
          </div>
          <textarea id="draft" placeholder="ここにAIレポートが入ります。"></textarea>
        </section>

        <aside class="side-panel">
          <div class="panel-head">
            <strong>確認</strong>
            <span id="aiStatus" class="status">待機中</span>
          </div>
          <div class="side-content">
            <div class="metric">
              <b>本文取得</b>
              <span id="articleMetric">未確認</span>
            </div>
            <div class="metric">
              <b>運用ルール</b>
              <span>記事本文が取れた時だけ生成。取れない記事は薄い作文を作らず止めます。</span>
            </div>
            <div class="metric">
              <b>投稿済み</b>
              <span>左のチェックは元ネタ単位で保存します。PCとスマホで共有される場合があります。</span>
            </div>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script>
    const PUBLIC_ORIGIN = "https://ionqrnews.netlify.app";
    const API = location.protocol === "file:" ? PUBLIC_ORIGIN : "";
    const CATEGORIES = [
      { id: "all", label: "全部" },
      { id: "ir", label: "最新IR" },
      { id: "sec", label: "重要SEC" },
      { id: "news", label: "IONQ NEWS" },
      { id: "quantum", label: "量子業界" },
      { id: "competitor", label: "競合" }
    ];

    const state = {
      items: [],
      posted: new Set(loadLocalPosted()),
      category: "all",
      query: "",
      selectedId: "",
      latestArticle: null
    };

    const els = {
      tabs: document.getElementById("tabs"),
      items: document.getElementById("items"),
      updated: document.getElementById("updated"),
      search: document.getElementById("search"),
      reload: document.getElementById("reload"),
      selected: document.getElementById("selected"),
      testRead: document.getElementById("testRead"),
      makeReport: document.getElementById("makeReport"),
      copyDraft: document.getElementById("copyDraft"),
      openX: document.getElementById("openX"),
      draft: document.getElementById("draft"),
      charCount: document.getElementById("charCount"),
      readStatus: document.getElementById("readStatus"),
      aiStatus: document.getElementById("aiStatus"),
      articleMetric: document.getElementById("articleMetric")
    };

    init();

    function init() {
      renderTabs();
      bindEvents();
      loadPostedFromServer();
      refresh();
      setInterval(refresh, 60000);
    }

    function bindEvents() {
      els.reload.addEventListener("click", refresh);
      els.search.addEventListener("input", () => {
        state.query = els.search.value.trim().toLowerCase();
        renderItems();
      });
      els.testRead.addEventListener("click", testArticleRead);
      els.makeReport.addEventListener("click", makeReport);
      els.copyDraft.addEventListener("click", copyDraft);
      els.openX.addEventListener("click", openX);
      els.draft.addEventListener("input", updateCharCount);
    }

    function renderTabs() {
      els.tabs.innerHTML = "";
      CATEGORIES.forEach((cat) => {
        const button = document.createElement("button");
        button.className = "tab" + (cat.id === state.category ? " active" : "");
        button.textContent = cat.label;
        button.addEventListener("click", () => {
          state.category = cat.id;
          renderTabs();
          renderItems();
        });
        els.tabs.appendChild(button);
      });
    }

    async function refresh() {
      els.updated.textContent = "更新中";
      try {
        const response = await fetch(`${API}/.netlify/functions/latest-ionq`, { cache: "no-store" });
        const data = await response.json();
        state.items = normalizeLatest(data);
        els.updated.textContent = formatTime(data.updatedAt || new Date().toISOString());
        renderItems();
        if (!state.selectedId && state.items[0]) selectItem(state.items[0].id);
      } catch (error) {
        els.updated.textContent = "取得失敗";
        els.items.innerHTML = `<div class="empty">速報取得に失敗しました。${escapeHtml(error.message)}</div>`;
      }
    }

    function normalizeLatest(data) {
      const rows = [];
      addRows(rows, data.officialNews, "ir", "最新IR", "IR");
      addRows(rows, data.sec, "sec", "重要SEC", "SEC");
      addRows(rows, data.marketNews, "news", "IONQ NEWS", "NEWS");
      addRows(rows, data.quantumNews, "quantum", "量子業界", "QNEWS");
      addRows(rows, data.competitorSec, "competitor", "競合SEC", "CSEC");
      addRows(rows, data.competitorNews, "competitor", "競合NEWS", "CNEWS");
      return rows
        .filter((item) => item.url || item.title)
        .sort((a, b) => Date.parse(b.publishedAt || b.acceptedAt || 0) - Date.parse(a.publishedAt || a.acceptedAt || 0));
    }

    function addRows(rows, list, category, label, type) {
      (list || []).forEach((raw) => {
        const title = raw.title || [raw.ticker, raw.form, raw.description].filter(Boolean).join(" ");
        const source = raw.source || raw.companyName || raw.ticker || label;
        const publishedAt = raw.publishedAt || raw.acceptedAt || raw.filingDate || raw.reportDate || "";
        const url = raw.url || "";
        const id = stableId([type, title, source, url, publishedAt, raw.accessionNumber].join("|"));
        rows.push({
          ...raw,
          id,
          category,
          label,
          type,
          title,
          source,
          publishedAt,
          url
        });
      });
    }

    function renderItems() {
      const filtered = state.items.filter((item) => {
        if (state.category !== "all" && item.category !== state.category) return false;
        if (!state.query) return true;
        return `${item.title} ${item.source} ${item.label} ${item.form || ""}`.toLowerCase().includes(state.query);
      });

      els.items.innerHTML = "";
      if (!filtered.length) {
        els.items.innerHTML = '<div class="empty">表示する速報がありません。</div>';
        return;
      }

      filtered.forEach((item) => {
        const row = document.createElement("article");
        row.className = "item" + (item.id === state.selectedId ? " active" : "");
        row.innerHTML = `
          <div class="item-title">${escapeHtml(item.title)}</div>
          <div class="meta">
            <span class="badge">${escapeHtml(item.label)}</span>
            ${item.form ? `<span class="badge">${escapeHtml(item.form)}</span>` : ""}
            <span>${escapeHtml(item.source || "")}</span>
            <span>${escapeHtml(formatTime(item.publishedAt))}</span>
          </div>
          <div class="item-actions">
            <label class="posted">
              <input type="checkbox" ${state.posted.has(item.id) ? "checked" : ""}>
              投稿済み
            </label>
            <button type="button">選択</button>
          </div>
        `;
        row.querySelector("button").addEventListener("click", () => selectItem(item.id));
        row.querySelector("input").addEventListener("change", (event) => {
          event.stopPropagation();
          setPosted(item.id, event.target.checked);
        });
        row.addEventListener("dblclick", () => selectItem(item.id));
        els.items.appendChild(row);
      });
    }

    function selectItem(id) {
      const item = state.items.find((entry) => entry.id === id);
      if (!item) return;
      state.selectedId = id;
      state.latestArticle = null;
      els.draft.value = "";
      updateCharCount();
      setReadStatus("本文取得はまだ実行していません。", "");
      els.aiStatus.textContent = "待機中";
      els.articleMetric.textContent = "未確認";
      els.selected.innerHTML = `
        <h2>${escapeHtml(item.title)}</h2>
        <div class="selected-row">
          <span class="badge">${escapeHtml(item.label)}</span>
          ${item.form ? `<span class="badge">${escapeHtml(item.form)}</span>` : ""}
          <span class="status">${escapeHtml(item.source || "")}</span>
          <span class="status">${escapeHtml(formatTime(item.publishedAt))}</span>
        </div>
        <div class="selected-row">
          ${item.url ? `<a href="${escapeAttr(item.url)}" target="_blank" rel="noreferrer">元記事を開く</a>` : '<span class="warn">URLなし</span>'}
        </div>
      `;
      renderItems();
    }

    async function testArticleRead() {
      const item = selectedItem();
      if (!item) return;
      setBusy(true, "本文取得中");
      setReadStatus("記事本文を取りに行っています。", "");
      try {
        const url = `${API}/.netlify/functions/report?testFetch=1&url=${encodeURIComponent(item.url)}`;
        const data = await fetch(url, { cache: "no-store" }).then((r) => r.json());
        state.latestArticle = data.article || null;
        showArticleResult(data);
      } catch (error) {
        setReadStatus(`本文取得エラー: ${error.message}`, "ng");
        els.articleMetric.textContent = "失敗";
      } finally {
        setBusy(false);
      }
    }

    async function makeReport() {
      const item = selectedItem();
      if (!item) return;
      setBusy(true, "AI生成中");
      els.aiStatus.textContent = "生成中";
      setReadStatus("記事本文を読んでからレポートを作っています。", "");
      try {
        const response = await fetch(`${API}/.netlify/functions/report`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(item)
        });
        const data = await response.json();
        state.latestArticle = data.article || null;
        if (!data.ok) {
          showArticleResult(data);
          els.aiStatus.textContent = "停止";
          els.draft.value = failureMessage(data);
          updateCharCount();
          return;
        }
        els.draft.value = data.draft || "";
        updateCharCount();
        showArticleResult(data);
        els.aiStatus.textContent = "生成完了";
      } catch (error) {
        els.aiStatus.textContent = "失敗";
        els.draft.value = `生成に失敗しました。\n${error.message}`;
        updateCharCount();
      } finally {
        setBusy(false);
      }
    }

    function showArticleResult(data) {
      const article = data.article || {};
      if (article.ok || data.ok) {
        setReadStatus(`本文取得OK: ${article.method || "-"} / ${article.chars || 0}文字`, "ok");
      } else {
        setReadStatus(`本文取得不可: ${article.error || data.error || "unknown"}`, "ng");
      }
      els.articleMetric.textContent = [
        article.ok ? "OK" : "NG",
        `${article.chars || 0}文字`,
        article.method || "",
        article.finalUrl || ""
      ].filter(Boolean).join(" / ");
    }

    function failureMessage(data) {
      const article = data.article || {};
      return [
        "この記事は本文を取得できなかったため、AIレポート生成を止めました。",
        "",
        `理由: ${article.error || data.error || "unknown"}`,
        `取得文字数: ${article.chars || 0}`,
        "",
        "タイトルだけで薄い投稿案は作りません。元記事を開いて本文を確認するか、別ソースの記事で試してください。"
      ].join("\n");
    }

    function selectedItem() {
      const item = state.items.find((entry) => entry.id === state.selectedId);
      if (!item) {
        setReadStatus("先に速報を選んでください。", "ng");
        return null;
      }
      if (!item.url) {
        setReadStatus("この速報にはURLがありません。", "ng");
        return null;
      }
      return item;
    }

    async function copyDraft() {
      const text = els.draft.value.trim();
      if (!text) return;
      await navigator.clipboard.writeText(text);
      els.aiStatus.textContent = "コピー済み";
    }

    function openX() {
      const text = els.draft.value.trim();
      if (!text) return;
      const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
      window.open(url, "_blank", "noopener,noreferrer");
    }

    function updateCharCount() {
      els.charCount.textContent = `${els.draft.value.length}文字`;
    }

    function setReadStatus(message, type) {
      els.readStatus.textContent = message;
      els.readStatus.className = type === "ok" ? "read-ok" : type === "ng" ? "read-ng" : "status";
    }

    function setBusy(busy, label) {
      els.testRead.disabled = busy;
      els.makeReport.disabled = busy;
      if (label) els.aiStatus.textContent = label;
    }

    async function loadPostedFromServer() {
      try {
        const data = await fetch(`${API}/.netlify/functions/posted`, { cache: "no-store" }).then((r) => r.json());
        if (data.ok && Array.isArray(data.ids)) {
          data.ids.forEach((id) => state.posted.add(id));
          saveLocalPosted();
          renderItems();
        }
      } catch (error) {
        // Local storage is enough when server state is unavailable.
      }
    }

    async function setPosted(id, posted) {
      if (posted) state.posted.add(id);
      else state.posted.delete(id);
      saveLocalPosted();
      renderItems();
      try {
        await fetch(`${API}/.netlify/functions/posted`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ id, posted })
        });
      } catch (error) {
        // Keep local state even if the shared store is unavailable.
      }
    }

    function loadLocalPosted() {
      try {
        const parsed = JSON.parse(localStorage.getItem("ionq-clean-posted") || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function saveLocalPosted() {
      localStorage.setItem("ionq-clean-posted", JSON.stringify([...state.posted].slice(-1000)));
    }

    function stableId(value) {
      let hash = 2166136261;
      const text = String(value || "");
      for (let i = 0; i < text.length; i += 1) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return `i${(hash >>> 0).toString(16)}`;
    }

    function formatTime(value) {
      if (!value) return "";
      const ms = Date.parse(value);
      if (!Number.isFinite(ms)) return String(value).slice(0, 16);
      return new Intl.DateTimeFormat("ja-JP", {
        timeZone: "Asia/Tokyo",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(ms));
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }
  </script>
</body>
</html>
