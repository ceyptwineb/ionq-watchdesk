<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IONQ Watchdesk</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #fff;
      --ink: #18202a;
      --muted: #647080;
      --line: #d9dee6;
      --blue: #2458c6;
      --green: #16845b;
      --red: #bd3d43;
      --amber: #a56a13;
      --violet: #7047a8;
      --teal: #0f766e;
      --dark: #17202b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Segoe UI", "Noto Sans JP", system-ui, sans-serif;
    }

    button, select, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }

    .shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 4px 0 14px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: #fff;
      background: var(--dark);
      font-weight: 800;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 19px; }
    h2 { font-size: 16px; }
    h3 { font-size: 14px; line-height: 1.45; }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--green);
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .icon-btn, .btn {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 7px 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn.primary {
      color: #fff;
      border-color: var(--blue);
      background: var(--blue);
    }

    .btn.dark {
      color: #fff;
      border-color: var(--dark);
      background: var(--dark);
    }

    .headline {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      padding: 16px 0 10px;
    }

    .headline p {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .toplane { margin: 0 0 12px; }
    .toplane .lane-head { border-top: 3px solid var(--dark); }
    .toplist { max-height: 320px; }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 999px;
      background: #eef2f8;
      color: var(--blue);
      margin-right: 5px;
    }

    .feeds {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      align-items: start;
    }

    .lane {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .lane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 43px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .lane[data-type="IR"] .lane-head { border-top: 3px solid var(--blue); }
    .lane[data-type="SEC"] .lane-head { border-top: 3px solid var(--red); }
    .lane[data-type="NEWS"] .lane-head { border-top: 3px solid var(--amber); }
    .lane[data-type="QNEWS"] .lane-head { border-top: 3px solid var(--teal); }
    .lane[data-type="CIRS"] .lane-head { border-top: 3px solid var(--green); }
    .lane[data-type="X"] .lane-head { border-top: 3px solid var(--violet); }

    .count {
      color: var(--muted);
      font-size: 11px;
    }

    .lane-list {
      display: grid;
      max-height: 440px;
      overflow: auto;
    }

    .story {
      border-bottom: 1px solid #edf0f4;
      background: #fff;
      min-height: 96px;
      display: grid;
      width: 100%;
      color: var(--ink);
    }

    .story:hover, .story.selected { background: #f0f5ff; }
    .story.posted { opacity: .5; }

    .story-main {
      appearance: none;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 11px 12px 7px;
      display: grid;
      gap: 6px;
      width: 100%;
      color: var(--ink);
    }

    .story-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .story-title {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 650;
    }

    .feed-posted {
      margin: 0 10px 9px auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
    }

    .feed-posted input { width: 15px; height: 15px; margin: 0; }

    .empty {
      padding: 18px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .composer {
      display: grid;
      grid-template-columns: minmax(280px, .72fr) minmax(0, 1.28fr);
      gap: 12px;
      margin-top: 14px;
    }

    .controls, .draft {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
    }

    .controls { display: grid; gap: 12px; align-content: start; }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
    }

    select { min-height: 40px; }

    .selected-story {
      border-left: 3px solid var(--blue);
      padding: 9px 10px;
      background: #f7f9fc;
      min-height: 74px;
    }

    .selected-story span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 4px;
    }

    .control-actions, .draft-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .draft {
      color: #f4f7fb;
      background: var(--dark);
      border-color: var(--dark);
      display: grid;
      gap: 10px;
    }

    .draft-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .draft-head span { color: #aeb8c5; font-size: 12px; }

    textarea#draftText {
      min-height: 255px;
      resize: vertical;
      color: #f8fafc;
      border-color: #3a4654;
      background: #111821;
      line-height: 1.55;
    }

    .draft .btn { border-color: #485563; background: #24303d; color: #fff; }
    .draft .btn.primary { border-color: #4e78e8; background: #315fcf; }

    .posted-check {
      min-height: 36px;
      margin: 0;
      padding: 7px 10px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid #485563;
      border-radius: 7px;
      color: #fff;
      background: #24303d;
      cursor: pointer;
    }

    .posted-check input { width: 17px; height: 17px; margin: 0; }

    .error {
      display: none;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #edb6ba;
      border-radius: 7px;
      color: #8f272e;
      background: #fff4f4;
      font-size: 12px;
    }

    @media (max-width: 1100px) {
      .feeds { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 700px) {
      .shell { padding: 10px; }
      header, .headline { align-items: flex-start; }
      header { flex-direction: column; }
      .status { justify-content: flex-start; }
      .feeds, .composer { grid-template-columns: 1fr; }
      .lane-list { max-height: 310px; }
      textarea#draftText { min-height: 220px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <div class="mark">IQ</div>
        <div>
          <h1>IONQ Watchdesk</h1>
          <p>速報・一次情報・投稿作成</p>
        </div>
      </div>
      <div class="status">
        <span class="live"><i class="dot"></i>自動更新中</span>
        <span id="lastUpdated">未更新</span>
        <span id="countdown">次回 5分</span>
        <button class="icon-btn" id="refreshButton" type="button">更新</button>
      </div>
    </header>

    <div class="headline">
      <div>
        <h2>最新速報</h2>
        <p>カードを選ぶと投稿作成欄へ送られます・時刻はすべて日本時間(JST)</p>
      </div>
    </div>

    <section class="lane toplane" data-type="NEW">
      <div class="lane-head"><h2>新着ニュース（未投稿が上）</h2><span class="count" id="countNEW">0件</span></div>
      <div class="lane-list toplist" id="feedNEW"><div class="empty">取得中...</div></div>
    </section>

    <div class="error" id="errorBox"></div>

    <section class="composer">
      <div class="controls">
        <h2>投稿作成</h2>
        <div>
          <label>選択中</label>
          <div class="selected-story" id="selectedStory">最新情報を取得しています</div>
        </div>
        <div class="control-actions">
          <button class="btn primary" id="generateButton" type="button">投稿案を作成</button>
          <button class="btn" id="openSourceButton" type="button">出典を開く</button>
        </div>
      </div>

      <div class="draft">
        <div class="draft-head">
          <h2>投稿案</h2>
          <span id="charCount">長文X 0 / 25000</span>
        </div>
        <textarea id="draftText" aria-label="投稿案" placeholder="情報を選んで投稿案を作成"></textarea>
        <div class="draft-actions">
          <button class="btn" id="copyButton" type="button">コピー</button>
          <label class="posted-check"><input id="postedCheck" type="checkbox"> 投稿済み</label>
          <button class="btn primary" id="openXButton" type="button">コピーしてX</button>
        </div>
      </div>
    </section>

    <main class="feeds" id="feeds">
      <section class="lane" data-type="IR">
        <div class="lane-head"><h2>最新IR</h2><span class="count" id="countIR">0件</span></div>
        <div class="lane-list" id="feedIR"><div class="empty">取得中...</div></div>
      </section>
      <section class="lane" data-type="SEC">
        <div class="lane-head"><h2>重要SEC</h2><span class="count" id="countSEC">0件</span></div>
        <div class="lane-list" id="feedSEC"><div class="empty">取得中...</div></div>
      </section>
      <section class="lane" data-type="NEWS">
        <div class="lane-head"><h2>IONQニュース</h2><span class="count" id="countNEWS">0件</span></div>
        <div class="lane-list" id="feedNEWS"><div class="empty">取得中...</div></div>
      </section>
      <section class="lane" data-type="QNEWS">
        <div class="lane-head"><h2>量子業界</h2><span class="count" id="countQNEWS">0件</span></div>
        <div class="lane-list" id="feedQNEWS"><div class="empty">取得中...</div></div>
      </section>
      <section class="lane" data-type="CIRS">
        <div class="lane-head"><h2>競合IR/SEC</h2><span class="count" id="countCIRS">0件</span></div>
        <div class="lane-list" id="feedCIRS"><div class="empty">取得中...</div></div>
      </section>
      <section class="lane" data-type="X">
        <div class="lane-head"><h2>公式X</h2><span class="count" id="countX">0件</span></div>
        <div class="lane-list" id="feedX"><div class="empty">取得中...</div></div>
      </section>
    </main>
  </div>

  <script>
    const PUBLIC_ORIGIN = "https://ionqrnews.netlify.app";
    const PUBLIC_API = `${PUBLIC_ORIGIN}/.netlify/functions/latest-ionq`;
    const LOCAL_VIEW = location.protocol === "file:" || ["localhost", "127.0.0.1"].includes(location.hostname);
    const API_URL = LOCAL_VIEW ? PUBLIC_API : "/.netlify/functions/latest-ionq";
    // 「投稿済み」状態を端末間で共有する保存API
    const POSTED_API = LOCAL_VIEW ? `${PUBLIC_ORIGIN}/.netlify/functions/posted` : "/.netlify/functions/posted";
    const REFRESH_SECONDS = 300;   // 自動更新は5分間隔（関数呼び出し＝Netlify使用量を抑える）。手動更新はいつでも可
    const state = {
      entries: { IR: [], SEC: [], NEWS: [], QNEWS: [], CIRS: [], X: [] },
      selected: null,
      seconds: REFRESH_SECONDS,
      xStatus: "manual",
      posted: new Set(JSON.parse(localStorage.getItem("ionq_posted_v2") || "[]"))
    };

    const els = {
      lastUpdated: document.getElementById("lastUpdated"),
      countdown: document.getElementById("countdown"),
      error: document.getElementById("errorBox"),
      selected: document.getElementById("selectedStory"),
      draft: document.getElementById("draftText"),
      charCount: document.getElementById("charCount"),
      postedCheck: document.getElementById("postedCheck")
    };

    function importantSec(item) {
      const form = String(item.form || "").toUpperCase();
      const description = String(item.description || "").toUpperCase();
      if (["3", "4", "5", "144"].includes(form)) return false;
      if (description.includes("OWNERSHIP")) return false;
      return /8-K|10-Q|10-K|S-3|424B|DEF 14A|PRE 14A|SC 13|13D|13G/.test(form) ||
        /PROSPECTUS|CURRENT REPORT|QUARTERLY|ANNUAL/.test(description);
    }

    function itemId(item) {
      // 端末・時間が変わっても同じ記事は同じIDになるよう安定キーにする。
      // SEC等(formあり)はaccession付きURLが固定なのでURL、ニュースはリンクが
      // 変動するため正規化タイトル+ソースを使う。
      const basis = item.form
        ? `${item.type}|${item.url || ""}`
        : `${item.type}|${normalizeSig(item.title)}|${item.source || ""}`;
      return encodeURIComponent(basis).slice(0, 500);
    }

    function normalizeSig(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/https?:\/\/\S+/g, "")
        .replace(/\s+-\s+[^-|]+$/g, "")
        .replace(/[\s　]+/g, " ")
        .trim();
    }

    function persistPostedLocal() {
      localStorage.setItem("ionq_posted_v2", JSON.stringify([...state.posted]));
    }

    // チェックの更新：ローカル即時保存＋サーバーへ同期（失敗してもローカルは保持）
    function setPosted(id, posted) {
      if (posted) state.posted.add(id);
      else state.posted.delete(id);
      persistPostedLocal();
      fetch(POSTED_API, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ id, posted })
      }).catch(() => {});
    }

    // サーバーの投稿済み状態を読み込み、画面・ローカルに反映（端末間同期）
    async function loadPosted() {
      try {
        const res = await fetch(POSTED_API, { cache: "no-store" });
        if (!res.ok) return;
        const data = await res.json();
        const serverIds = new Set(data.ids || []);
        // オフライン中にこの端末だけで付けた分は残しつつ、サーバーを正とする
        const localOnly = [...state.posted].filter(id => !serverIds.has(id));
        state.posted = new Set(serverIds);
        localOnly.forEach(id => state.posted.add(id));
        persistPostedLocal();
        if (localOnly.length) {
          fetch(POSTED_API, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ addIds: localOnly })
          }).catch(() => {});
        }
      } catch (error) {
        // オフライン等：localStorageのみで継続
      }
    }

    function normalize(data) {
      state.entries.IR = (data.officialNews || []).map(item => ({
        ...item, type: "IR", confidence: "一次情報候補", source: item.source || "IonQ IR"
      }));

      state.entries.SEC = (data.sec || []).filter(importantSec).map(item => ({
        ...item, type: "SEC", title: `${item.form}｜${secLabel(item)}`, source: "SEC EDGAR", confidence: "一次情報",
        publishedAt: item.acceptedAt || item.filingDate
      }));

      state.entries.NEWS = (data.marketNews || []).map(item => ({
        ...item, type: "NEWS", confidence: "報道", source: item.source || "News"
      }));

      state.entries.QNEWS = (data.quantumNews || []).map(item => ({
        ...item, type: "QNEWS", confidence: "業界報道", source: item.source || "Quantum News"
      }));

      const competitorSec = (data.competitorSec || []).map(item => ({
        ...item,
        type: "CIRS",
        title: `${item.ticker || "競合"} ${item.form}｜${secLabel(item)}`,
        source: `${item.ticker || "競合"} SEC`,
        confidence: "競合一次情報",
        publishedAt: item.acceptedAt || item.filingDate
      }));
      const competitorNews = (data.competitorNews || []).map(item => ({
        ...item,
        type: "CIRS",
        confidence: "競合報道",
        source: item.source || "Competitor IR"
      }));
      state.entries.CIRS = [...competitorSec, ...competitorNews]
        .sort((a, b) => Date.parse(b.publishedAt || b.filingDate || 0) - Date.parse(a.publishedAt || a.filingDate || 0));

      state.entries.X = [];
      state.xStatus = "manual";
    }

    function secLabel(item) {
      const form = String(item.form || "").toUpperCase();
      if (form === "8-K") return "臨時重要開示";
      if (form === "10-Q") return "四半期報告書";
      if (form === "10-K") return "年次報告書";
      if (form.includes("S-3") || form.includes("424B")) return "資金調達・目論見書";
      if (form.includes("13D") || form.includes("13G") || form.includes("SC 13")) return "大口保有報告";
      return item.description || "SEC開示";
    }

    function renderAll() {
      ["IR", "SEC", "NEWS", "QNEWS", "CIRS", "X"].forEach(type => renderLane(type));
      renderTopFeed();
      if (!state.selected) selectLatest("IR");
    }

    const TYPE_BADGE = { IR: "IR", SEC: "SEC", NEWS: "ニュース", QNEWS: "量子", CIRS: "競合", X: "X" };

    function buildTopFeed() {
      const all = ["IR", "SEC", "NEWS", "QNEWS", "CIRS", "X"].flatMap(type => state.entries[type]);
      const seen = new Set();
      const unique = [];
      all.forEach(item => {
        const key = `${item.url || ""}|${item.title || ""}`;
        if (seen.has(key)) return;
        seen.add(key);
        unique.push(item);
      });
      const ts = item => Date.parse(item.publishedAt || item.filingDate || 0) || 0;
      const isPosted = item => state.posted.has(itemId(item));
      return unique.sort((a, b) => {
        const pa = isPosted(a) ? 1 : 0;
        const pb = isPosted(b) ? 1 : 0;
        if (pa !== pb) return pa - pb;     // 未投稿を上へ
        return ts(b) - ts(a);              // 新しい順
      });
    }

    function renderTopFeed() {
      const list = document.getElementById("feedNEW");
      const entries = buildTopFeed();
      state.topEntries = entries;
      const unposted = entries.filter(item => !state.posted.has(itemId(item))).length;
      document.getElementById("countNEW").textContent = `未投稿 ${unposted}件 / 全${entries.length}件`;

      if (!entries.length) {
        list.innerHTML = `<div class="empty">該当する最新情報はありません</div>`;
        return;
      }

      list.innerHTML = entries.slice(0, 30).map(item => {
        const id = itemId(item);
        const selected = state.selected && itemId(state.selected) === id;
        const badge = TYPE_BADGE[item.type] || item.type;
        return `<article class="story ${selected ? "selected" : ""} ${state.posted.has(id) ? "posted" : ""}">
          <button class="story-main" data-top="${id}" type="button">
            <span class="story-meta"><span><span class="badge">${badge}</span>${escapeHtml(item.source)}</span><span>${formatDate(item.publishedAt || item.filingDate)}</span></span>
            <span class="story-title">${escapeHtml(item.title)}</span>
          </button>
          <label class="feed-posted"><input type="checkbox" data-top-posted="${id}" ${state.posted.has(id) ? "checked" : ""}> 投稿済み</label>
        </article>`;
      }).join("");

      list.querySelectorAll("[data-top]").forEach(button => {
        button.addEventListener("click", () => {
          const item = state.topEntries.find(candidate => itemId(candidate) === button.dataset.top);
          if (item) selectItem(item);
        });
      });

      list.querySelectorAll("[data-top-posted]").forEach(checkbox => {
        checkbox.addEventListener("change", () => {
          const id = checkbox.dataset.topPosted;
          setPosted(id, checkbox.checked);
          if (state.selected && itemId(state.selected) === id) els.postedCheck.checked = checkbox.checked;
          ["IR", "SEC", "NEWS", "QNEWS", "CIRS", "X"].forEach(renderLane);
          renderTopFeed();
        });
      });
    }

    function renderLane(type) {
      const list = document.getElementById(`feed${type}`);
      const entries = state.entries[type].slice(0, 8);
      document.getElementById(`count${type}`).textContent = type === "X" ? "無料" : `${entries.length}件`;

      if (!entries.length) {
        const message = type === "X" ? xStatusMessage() : "該当する最新情報はありません";
        list.innerHTML = `<div class="empty">${message}</div>`;
        return;
      }

      list.innerHTML = entries.map(item => {
        const id = itemId(item);
        const selected = state.selected && itemId(state.selected) === id;
        return `<article class="story ${selected ? "selected" : ""} ${state.posted.has(id) ? "posted" : ""}">
          <button class="story-main" data-entry="${id}" type="button">
            <span class="story-meta"><span>${escapeHtml(item.source)}</span><span>${formatDate(item.publishedAt || item.filingDate)}</span></span>
            <span class="story-title">${escapeHtml(item.title)}</span>
          </button>
          <label class="feed-posted"><input type="checkbox" data-feed-posted="${id}" ${state.posted.has(id) ? "checked" : ""}> 投稿済み</label>
        </article>`;
      }).join("");

      list.querySelectorAll("[data-entry]").forEach(button => {
        button.addEventListener("click", () => {
          const item = state.entries[type].find(candidate => itemId(candidate) === button.dataset.entry);
          if (item) selectItem(item);
        });
      });

      list.querySelectorAll("[data-feed-posted]").forEach(checkbox => {
        checkbox.addEventListener("change", () => {
          const id = checkbox.dataset.feedPosted;
          setPosted(id, checkbox.checked);
          if (state.selected && itemId(state.selected) === id) els.postedCheck.checked = checkbox.checked;
          renderLane(type);
          renderTopFeed();
        });
      });
    }

    function xStatusMessage() {
      const listUrl = "https://x.com/i/lists/2068093425489264980";
      return `<a href="${listUrl}" target="_blank" rel="noreferrer">選定Xリストを開く</a><br><small>無料・X上で確認</small>`;
    }

    function selectLatest(type) {
      const item = state.entries[type][0] || ["IR", "SEC", "NEWS", "QNEWS", "CIRS", "X"].flatMap(key => state.entries[key])[0];
      if (item) selectItem(item);
    }

    function selectItem(item) {
      state.selected = item;
      els.selected.innerHTML = `<strong>${escapeHtml(shortTitle(item.title, 90))}</strong><span>${escapeHtml(item.source)} / ${item.confidence}</span>`;
      els.postedCheck.checked = state.posted.has(itemId(item));
      ["IR", "SEC", "NEWS", "QNEWS", "CIRS", "X"].forEach(renderLane);
      renderTopFeed();
    }

    function generateDraft() {
      if (!state.selected) return;
      els.draft.value = buildDraft(state.selected, state.selected.type);
      updateCount();
    }

    function buildDraft(item, priority) {
      const view = analyze(item, priority);
      const sourceUrl = /^https?:\/\//i.test(String(item.url || "")) ? `\n${item.url}` : "";
      const title = cleanTitle(item.title);
      const reportTitle = titleForReport(item, view);
      // 見出しに含まれる具体的な数字・相手先を拾って前面に出す
      const facts = extractFacts(item);
      const factsBlock = facts.length ? `\n\n押さえる数字：\n${facts.map(f => `・${f}`).join("\n")}` : "";
      const when = formatDate(item.publishedAt || item.acceptedAt || item.filingDate);
      const metaLine = when ? `\n（${when} JST時点・${shortSource(item)}）` : "";
      // QNEWS/CIRSに加え、具体的な競合が見出しに出ていれば比較欄を出す（NEWS型の「IonQ vs ○○」等）
      const showComparison = ["QNEWS", "CIRS"].includes(item.type) || rivalCompanies(item).length > 0;
      const comparison = showComparison ? `\n\nIonQとの比較：\n${comparisonForIonQ(view, title, item)}` : "";
      // 英語見出しの日本語ハイライト（1行）
      const summaryLine = `\nひとことで：${japaneseSummary(item, view, facts)}`;
      // セクション統合：「読み解き」に用語解説＋注目度をまとめ、3→2セクションに
      const insight = `${termExplanation(view, title)}\n${whyBig(item, view, title)}`;
      const draft = `${reportTitle}\n${headlineFor(item, view)}${summaryLine}${metaLine}\n\n要点：\n${eventLine(item, view, title)}${factsBlock}\n\nニュース内容：\n${newsExplanation(item, view, title)}\n\n読み解き：\n${insight}${comparison}\n\n評価：\n・凄さ：${importanceStars(item, view)}\n・株価影響：${stockStars(item, view)}\n・関連銘柄： ${tickerLine(item, view)}\n\n結論：\n${conclusionFor(item, view)}\n\n出典：${shortSource(item)}${sourceUrl}`;
      return fitXLimit(draft);
    }

    // 見出し・本文から定量的な事実（値動き・金額・量子ビット数・関係機関）を抽出
    function extractFacts(item) {
      const text = `${item.title || ""} ${item.description || ""}`;
      const facts = [];

      const pct = text.match(/([+-]?\d+(?:\.\d+)?)\s?%/);
      if (pct) {
        const n = pct[1].replace("+", "");
        const up = /(jump|surg|soar|rally|rise|gain|rocket|pop|climb|grow|increase|up\b|上昇|急騰|高騰|増|伸)/i.test(text);
        const down = /(fall|drop|plunge|slump|sink|slide|declin|tumble|crash|down\b|下落|急落|減)/i.test(text);
        const dir = down && !up ? "減" : (up ? "増" : "変動");
        if (/stock|shares|株価|株が/i.test(text)) {
          facts.push(`株価${down && !up ? "下落" : "上昇"} ${n}%`);
        } else if (/revenue|sales|bookings|backlog|growth|margin|売上|受注|成長|業績|利益/i.test(text)) {
          facts.push(`業績${dir} ${n}%`);
        } else {
          facts.push(`変動 ${n}%`);
        }
      }

      const money = text.match(/\$\s?\d[\d,]*(?:\.\d+)?\s?(?:billion|million|bn|b|m)?\b/gi);
      if (money) money.slice(0, 2).forEach(m => facts.push(`金額 ${normalizeMoney(m)}`));

      const qubit = text.match(/(\d[\d,]*)\s?-?\s?qubit/i);
      if (qubit) facts.push(`量子ビット ${qubit[1]}`);

      const orgs = [
        [/air force|空軍/i, "米空軍"],
        [/darpa/i, "DARPA"],
        [/\bnasa\b/i, "NASA"],
        [/department of defense|\bdod\b|pentagon|国防総省/i, "米国防総省"],
        [/\bnist\b/i, "NIST"],
        [/\bdoe\b|department of energy/i, "米エネルギー省"],
        [/\barmy\b|陸軍/i, "米陸軍"],
        [/\bnavy\b|海軍/i, "米海軍"]
      ];
      orgs.forEach(([re, label]) => {
        if (re.test(text) && !facts.some(f => f.includes(label))) facts.push(`関係先 ${label}`);
      });

      // 比較・対決記事（例「QBTS or RGTI」「IonQ vs Rigetti」）の対象銘柄を拾う
      const titleTickers = findTickers(item.title);
      if (titleTickers.length >= 2 && /\bvs\.?\b|\bversus\b|\bor\b|対決|比較/i.test(item.title || "")) {
        facts.push(`比較 ${titleTickers.slice(0, 3).join(" vs ")}`);
      }

      return facts;
    }

    function normalizeMoney(raw) {
      const s = raw.replace(/\s+/g, "");
      const num = parseFloat(s.replace(/[^\d.]/g, ""));
      if (!isFinite(num)) return raw.trim();
      const isB = /billion|bn|b$/i.test(s);
      const isM = /million|m$/i.test(s);
      let manUsd = null;
      if (isB) manUsd = num * 100000;   // 1B = 100,000万ドル
      else if (isM) manUsd = num * 100; // 1M = 100万ドル
      if (manUsd == null) return `$${jpNum(num)}`;
      const head = `$${jpNum(num)}${isB ? "B" : "M"}`;
      if (manUsd >= 10000) return `${head}（約${jpNum(Math.round(manUsd / 10000 * 100) / 100)}億ドル）`;
      return `${head}（約${jpNum(manUsd)}万ドル）`;
    }

    function jpNum(n) {
      return Number.isInteger(n) ? n.toLocaleString("ja-JP") : n.toLocaleString("ja-JP", { maximumFractionDigits: 2 });
    }

    // 英語見出しを構造化要素から日本語1行に要約（完全翻訳ではなくハイライト）
    function japaneseSummary(item, view, facts) {
      const labelPhrase = {
        "提携・契約": "提携・契約に関する話題", "M&A": "買収・合併の話題", "業績": "業績・決算の話題",
        "株価": "株価変動の話題", "政府案件": "政府・国防案件の話題", "技術": "技術・性能の話題",
        "市場評価": "アナリスト評価・目標株価の話題", "投資比較": "他の量子銘柄との比較", "資金調達": "資金調達の話題",
        "大口保有": "大株主の保有動向", "競合動向": "競合の動向", "業界資金": "量子業界への資金流入",
        "量子業界": "量子業界の話題", "公式発表": "IonQ公式発表", "SEC 8-K": "SEC 8-K（臨時重要開示）",
        "SEC 10-Q": "SEC 10-Q（四半期報告）", "SEC 10-K": "SEC 10-K（年次報告）",
        "競合SEC": "競合のSEC開示", "NEWS": "IonQ関連の報道", "SEC": "SEC開示"
      }[view.label] || "IonQ関連の最新情報";
      const subject = item.type === "IR" ? "IonQ公式" : (item.type === "SEC" ? "IonQ（SEC）" : shortSource(item));
      const tail = facts.length ? `（${facts.join("、")}）` : "";
      return `${subject}：${labelPhrase}${tail}`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    // 抽出した数字・相手先の大きさで★を加点する（金額・値動き・政府案件・量子ビット数）
    function factBump(item) {
      const text = `${item.title || ""} ${item.description || ""}`;
      let imp = 0;
      let stock = 0;

      const moneyMatch = text.match(/\$\s?\d[\d,]*(?:\.\d+)?\s?(?:billion|million|bn|b|m)?\b/i);
      if (moneyMatch) {
        const oku = moneyToOku(moneyMatch[0]);
        if (oku >= 5) { imp += 2; stock += 2; }
        else if (oku >= 1) { imp += 1; stock += 1; }
        else { stock += 1; }
      }

      const pct = text.match(/([+-]?\d+(?:\.\d+)?)\s?%/);
      if (pct) {
        const v = Math.abs(parseFloat(pct[1]));
        if (v >= 10) stock += 2;
        else if (v >= 5) stock += 1;
      }

      if (/air force|darpa|\bnasa\b|department of (defense|energy)|\bdod\b|\bnist\b|pentagon|空軍|国防|陸軍|海軍/i.test(text)) {
        imp += 1;
      }

      const qubit = text.match(/(\d[\d,]*)\s?-?\s?qubit/i);
      if (qubit && parseInt(qubit[1].replace(/,/g, ""), 10) >= 100) imp += 1;

      return { imp, stock };
    }

    function moneyToOku(raw) {
      const s = raw.replace(/\s+/g, "");
      const num = parseFloat(s.replace(/[^\d.]/g, ""));
      if (!isFinite(num)) return 0;
      if (/billion|bn|b$/i.test(s)) return num * 10;   // 1B = 10億ドル
      if (/million|m$/i.test(s)) return num / 100;     // 100M = 1億ドル
      return 0;
    }

    function titleForReport(item, view) {
      if (item.type === "QNEWS") {
        return view.label === "量子業界" ? "【量子業界】" : `【量子業界｜${view.label}】`;
      }
      if (item.type === "CIRS") {
        return view.label === "競合SEC" ? "【競合IR/SEC】" : `【競合IR/SEC｜${view.label}】`;
      }
      return `【IONQ｜${view.label}】`;
    }

    function actionFor(label) {
      const actions = {
        "投資比較": "記事の結論だけで選ばず、売上成長と企業評価を競合と比較して判断。",
        "M&A": "買収額と業績への寄与が確認できるまで、強材料と決めつけない。",

        "大口保有": "保有比率の増減と目的を確認。単なる定期報告なら過剰反応しない。",
        "SEC": "見出しでは判断せず、本文と添付資料の数字を確認。"
      };
      return actions[label] || actions.NEWS;
    }

    function headlineFor(item, view) {
      const title = cleanTitle(item.title);
      const text = title.toLowerCase();
      if (item.type === "QNEWS" || item.type === "CIRS") {
        if (/ion trap|trapped ion|ion-trap|イオントラップ/.test(text) && /laser|レーザー/.test(text)) {
          return "イオントラップ量子計算の“心臓部”を小型化する話。地味だが、実用化にはかなり重要。";
        }
        if (/ibm|google|alphabet|microsoft|azure|amazon|aws|braket|rigetti|rgti|d-wave|dwave|qbts|quantum computing inc|qubt|quantinuum|honeywell|\bhon\b|pasqal|quera|atom computing|nvidia|nvda/.test(text)) {
          return "競合・周辺企業が一歩進めた可能性。まずは何が進んだのかを確認したい。";
        }
        if (/funding|raises|investment|grant|budget|fund|資金|投資|予算/.test(text)) {
          return "量子分野に資金が流れ込むニュース。市場拡大の温度感を見る材料。";
        }
        if (/government|defense|darpa|nist|policy|regulation|政府|国防|政策|規制/.test(text)) {
          return "量子技術が国家戦略として扱われているサイン。民間企業にも波及し得る。";
        }
        return "量子業界の温度感を測るニュース。IonQ単体ではなく、市場全体の流れを見る材料。";
      }
      if (view.label === "株価") return "値動きの理由を分解する材料。大事なのは株価より、その裏に事業変化があるか。";
      if (view.label === "提携・契約") return "商用化に近づく可能性がある材料。相手先と契約額がカギ。";
      if (view.label === "業績") return "期待ではなく数字でIonQを見る局面。売上、受注、現金が焦点。";
      if (view.label.startsWith("SEC")) return "一次情報なので重要。見出しではなく本文の数字を見るべき材料。";
      return "IonQの成長ストーリーに関係する可能性がある材料。数字と相手先を確認したい。";
    }

    function eventLine(item, view, title) {
      const source = shortSource(item);
      if (item.type === "QNEWS") {
        return `${source}が「${shortTitle(title, 96)}」を報道。IonQそのものではなく、量子コンピューター産業の部品・技術・政策・競争環境を読むニュース。`;
      }
      if (item.type === "CIRS" && item.form) {
        return `${item.ticker || "競合"}が${item.form}をSECへ提出。競合企業の一次情報。`;
      }
      if (item.type === "CIRS") {
        const tt = findTickers(item.title);
        if (tt.length >= 2) {
          return `${source}が「${shortTitle(title, 96)}」を報道。${tt.slice(0, 3).map(t => COMPANY_INFO[t] ? COMPANY_INFO[t].name : t).join("／")}を巡る競合材料。`;
        }
        return `${source}が「${shortTitle(title, 96)}」を報道。競合・周辺企業の材料。`;
      }
      if (item.type === "SEC") return view.lead;
      return view.lead;
    }

    function newsExplanation(item, view, title) {
      const text = `${title} ${item.description || ""}`.toLowerCase();
      const source = shortSource(item);
      // 比較・対決記事は各社の方式と論点を具体的に書く（テンプレ回避・深掘り）
      const titleTickers = findTickers(item.title);
      if (titleTickers.length >= 2) {
        const named = titleTickers.slice(0, 3).map(companyDesc).join(" と ");
        return `${named} を比較する記事。方式が違えば強みも違う——イオントラップは高忠実度・全結合、超伝導は高速で量子ビットを増やしやすい、アニーリングは最適化特化。勝敗は「忠実度」「量子ビット数」「商用提供の広さ」「資金力」のどの軸で測るかで結論が変わる。下の比較欄でIonQの勝ち負けを整理した。`;
      }
      if (/larger drop than the general market|drop than the general market|underperform|suffers a larger drop|market: key/.test(text)) {
        return `${source}は、IonQ株が市場全体より大きく下げたことを取り上げている。これは新しい契約や技術発表というより、短期の株価変動を説明するタイプの記事。読むべき点は「下落の理由がIonQ固有の悪材料なのか、市場全体のリスクオフなのか」。`;
      }
      if (/stock.*(?:fall|drop|down|plunge|slide)|shares.*(?:fall|drop)|下落|急落/.test(text)) {
        return `${source}は、IonQ株の下落要因を扱っている。重要なのは下落率そのものではなく、売上・契約・資金調達など事業価値を変える材料が含まれるかどうか。`;
      }
      if (/stock.*(?:rise|gain|jump|pop|surge|soar)|shares.*(?:rise|gain|jump|soar)|上昇|急騰/.test(text)) {
        return `${source}は、IonQ株の上昇要因を扱っている。期待だけで上がったのか、契約・業績・技術進展などの裏付けがあるのかを分けて見たい。`;
      }
      if (item.type === "QNEWS") {
        return `${source}は、IonQ単体ではなく量子コンピューター業界の技術・政策・競争環境に関するニュースを報じている。IonQへの直接材料か、業界全体の追い風かを分けて読む必要がある。`;
      }
      if (item.type === "CIRS" && item.form) {
        return `${item.ticker || "競合"}のSEC開示。資金調達、業績、契約、リスク変化など、その会社の状況を読む一次情報。`;
      }
      if (item.type === "CIRS") {
        return `${source}による競合・周辺企業のニュース。技術、顧客、資金力、商用化スピードのどこに関係する話かを見る。`;
      }
      if (item.type === "SEC") return "SECに提出された一次情報。見出しではなく、本文の金額・日付・株式数・添付資料を確認する価値がある。";
      return `${source}によるIonQ関連ニュース。現時点では報道ベースなので、一次情報・具体的な数字・発表主体を確認してから材料性を判断したい。`;
    }

    function termExplanation(view, title) {
      // 見出し本文だけで判定する。view.body（テンプレ文）を混ぜると
      // 「8-K」なのに"資金"に誤反応する等のズレが出るため使わない。
      const text = String(title || "").toLowerCase();
      if (/larger drop than the general market|drop than the general market|general market|underperform/.test(text)) {
        return "general marketは市場全体のこと。larger drop than the general marketは、主要指数や市場平均よりも大きく下げたという意味。IonQ固有の悪材料とは限らず、高成長株や量子関連株がまとめて売られた可能性もある。";
      }
      if (/stock.*(?:fall|drop|down|plunge|slide)|shares.*(?:fall|drop)|下落|急落/.test(text)) {
        return "株価下落記事は、事業の悪化を示すものと、短期の需給・地合いを説明するものがある。本文で下落理由が具体的かどうかを見る必要がある。";
      }
      if (/stock.*(?:rise|gain|jump|pop|surge|soar)|shares.*(?:rise|gain|jump|soar)|上昇|急騰/.test(text)) {
        return "株価上昇記事は、材料の強さと期待先行を分けて見る必要がある。契約額や業績見通しがない場合、短期の値動き説明に近い。";
      }
      if (/ion trap|trapped ion|ion-trap|イオントラップ/.test(text) && /laser|レーザー/.test(text)) {

    function importanceStars(item, view) {
      const bump = factBump(item).imp;
      const score = clamp(scoreForImportance(item, view) + bump, 1, 5);

      { ticker: "$IONQ", patterns: [/ionq|ion q|イオンキュー|\bionq\b/] },
      { ticker: "$RGTI", patterns: [/rigetti|リゲッティ|\brgti\b/] },

    function findTickers(text) {
      const lower = String(text || "").toLowerCase();
      const found = [];
      TICKER_PAIRS.forEach(({ ticker, patterns }) => {
        if (patterns.some(pattern => pattern.test(lower)) && !found.includes(ticker)) found.push(ticker);
      });
      return found;
    }

      const found = findTickers(`${item.title || ""} ${item.description || ""} ${item.source || ""}`);

      if (["提携・契約", "業績", "SEC 8-K", "SEC 10-Q", "政府案件"].includes(view.label)) return 4;
      if (["M&A", "技術", "資金調達", "競合動向", "業界資金"].includes(view.label)) return 3;

    function comparisonForIonQ(view, title = "", item = {}) {

    function analyzeQuantum(item) {

    function analyzeCompetitorSec(item) {
      const form = String(item.form || "").toUpperCase();

      if (form === "8-K") return { label: "競合SEC", lead: `${ticker}が臨時重要開示8-KをSECへ提出。`, body: "契約、資金調達、経営変更などが出る可能性がある一次情報。内容次第で市場の見方が変わる。", watch: "フォーム、金額、契約相手、発効日、添付資料。" };
      if (form === "10-Q") return { label: "競合SEC", lead: `${ticker}が四半期報告書10-QをSECへ提出。`, body: "売上、現金、赤字、リスクを見られる資料。事業が前に進んでいるか、資金に余裕があるかを確認したい。", watch: "売上、現金、赤字、受注、リスク。" };

      return { label: "競合SEC", lead: `${ticker}が${form || "SEC書類"}を提出。`, body: "競合・周辺企業の一次情報。提出理由と数字を見て、重要度を判断したい。", watch: "提出理由、金額、日付、添付資料。" };

    function impactFor(item, view) {
      if (item.type === "QNEWS") {

        if (view.label === "業界資金") return "量子分野への資金流入は追い風。ただしIonQへ直接入る資金ではない点は明確にしたい。";
        return "直接材料ではないが、量子市場の拡大・政策支援・商用化の速度を見る補助線になる。";
      }
      if (item.type === "IR") return "公式発表なので優先度は高い。売上、契約、技術ロードマップに直結するか確認したい。";
      if (item.type === "SEC") return "一次情報なので信頼度は高い。数字や添付資料まで見れば投稿の説得力が上がる。";
      return "報道ベースなので、一次情報で裏取りできるかが重要。株価材料か事業材料かを分けて扱う。";
    }

    function analyzeSec(item) {
      const form = String(item.form || "").toUpperCase();
      if (form === "8-K") return { label: "SEC 8-K", lead: "IonQが臨時重要報告書8-KをSECへ提出。", body: "契約、資金調達、経営変更など、株価へ直結し得る事実が含まれる一次情報。", watch: "Item番号、金額、発効日、添付資料。" };
      if (form === "10-Q") return { label: "SEC 10-Q", lead: "IonQが四半期報告書10-QをSECへ提出。", body: "期待ではなく、売上・受注・資金余力から事業の進捗を検証できる重要資料。", watch: "売上、受注残、現金、赤字、希薄化。" };
      if (form === "10-K") return { label: "SEC 10-K", lead: "IonQが年次報告書10-KをSECへ提出。", body: "通期実績と事業リスクを通じ、長期成長ストーリーと現状の差を確認できる。", watch: "成長率、現金、主要リスク、発行株式数。" };
      if (form.includes("S-3") || form.includes("424B")) return { label: "資金調達", lead: `IonQが${form}をSECへ提出。`, body: "開発資金の確保につながる一方、新株発行なら既存株主の希薄化要因になる。", watch: "発行額、資金使途、発行済みか登録のみか。" };
      if (/13D|13G/.test(form)) return { label: "大口保有", lead: `IonQ株に関する${form}がSECへ提出。`, body: "大株主の保有状況や保有目的の変化を示す開示。売買の方向と提出者を確認したい。", watch: "提出者、保有比率、増減、保有目的。" };
      return { label: "SEC", lead: `IonQが${form || "重要書類"}をSECへ提出。`, body: "報道より優先して確認すべき一次情報。内容と数字を本文で確かめたい。", watch: "フォーム、提出理由、具体的な数字、添付資料。" };
    }

    function cleanTitle(title) {
      return String(title || "IONQ関連情報")
        .replace(/\s+-\s+[^-]+$/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function quoteTitle(title) {
      return `「${shortTitle(title, 110)}」`;
    }

    function signalFromTitle(title) {
      const percent = title.match(/\b\d+(?:\.\d+)?%/);
      return percent ? `見出しでは${percent[0]}の値動きに言及。` : "";
    }

    function shortTitle(title, max) {
      const clean = String(title || "IONQ関連情報").replace(/\s+-\s+[^-]+$/g, "").replace(/\s+/g, " ").trim();
      return clean.length > max ? `${clean.slice(0, max - 1)}…` : clean;
    }

    function shortSource(item) {
      if (item.type === "SEC") return `SEC EDGAR（${item.form || "提出書類"}）`;
      return shortTitle(String(item.source || item.type).replace(/^@/, "@"), 28);
    }

    function charWeight(char) {
      return /^[\u0000-\u00ff]$/.test(char) ? 1 : 2;
    }

    function nextWeightedToken(text, index) {
      const rest = text.slice(index);
      const url = rest.match(/^https?:\/\/[^\s]+/i);
      if (url) return { text: url[0], length: url[0].length, weight: 23 };
      const char = String.fromCodePoint(text.codePointAt(index));
      return { text: char, length: char.length, weight: charWeight(char) };
    }

    function weightedLength(text) {
      let total = 0;
      for (let index = 0; index < text.length;) {
        const token = nextWeightedToken(text, index);
        total += token.weight;
        index += token.length;
      }
      return total;
    }

    function sliceByWeight(text, maxWeight) {
      let result = "";
      let weight = 0;
      for (let index = 0; index < text.length;) {
        const token = nextWeightedToken(text, index);
        if (weight + token.weight > maxWeight) break;
        result += token.text;
        weight += token.weight;
        index += token.length;
      }
      return result;
    }

    const X_POST_LIMIT = 25000;

    function fitXLimit(text) {
      if (weightedLength(text) <= X_POST_LIMIT) return text;
      const sourceMarker = "\n\n出典：";
      const sourceIndex = text.lastIndexOf(sourceMarker);
      if (sourceIndex < 0) {
        return `${sliceByWeight(text, X_POST_LIMIT - charWeight("…")).trimEnd()}…`;
      }
      const main = text.slice(0, sourceIndex);
      const suffix = text.slice(sourceIndex);
      const limit = Math.max(1, X_POST_LIMIT - weightedLength(suffix) - charWeight("…"));
      return `${sliceByWeight(main, limit).trimEnd()}…${suffix}`;
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value || "";
      // 米国時間で来る配信時刻を、閲覧環境に関係なく日本時間(JST)で表示する
      return date.toLocaleString("ja-JP", { timeZone: "Asia/Tokyo", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char]);
    }

    function updateCount() {
      const count = weightedLength(els.draft.value);
      els.charCount.textContent = `長文X ${count} / ${X_POST_LIMIT}`;
      els.charCount.style.color = count > X_POST_LIMIT ? "#ff8990" : "#aeb8c5";
    }

    async function refresh() {
      document.getElementById("refreshButton").disabled = true;
      els.error.style.display = "none";
      try {
        const response = await fetch(API_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`取得失敗 ${response.status}`);
        const data = await response.json();
        if (data.error) throw new Error(data.message || data.error);
        await loadPosted();   // 投稿済み状態を端末間で同期
        normalize(data);
        renderAll();
        els.lastUpdated.textContent = `更新 ${formatDate(data.updatedAt || new Date())} JST`;
        state.seconds = REFRESH_SECONDS;
      } catch (error) {
        els.error.textContent = `最新情報を取得できません: ${error.message}`;
        els.error.style.display = "block";
      } finally {
        document.getElementById("refreshButton").disabled = false;
      }
    }

    document.getElementById("refreshButton").addEventListener("click", refresh);
    document.getElementById("generateButton").addEventListener("click", generateDraft);
    els.draft.addEventListener("input", updateCount);

    document.getElementById("openSourceButton").addEventListener("click", () => {
      if (state.selected?.url) window.open(state.selected.url, "_blank", "noreferrer");
    });

    document.getElementById("copyButton").addEventListener("click", async () => {
      await navigator.clipboard.writeText(els.draft.value);
      document.getElementById("copyButton").textContent = "コピー済み";
      setTimeout(() => document.getElementById("copyButton").textContent = "コピー", 1000);
    });

    els.postedCheck.addEventListener("change", () => {
      if (!state.selected) return;
      const id = itemId(state.selected);
      setPosted(id, els.postedCheck.checked);
      renderLane(state.selected.type);
      renderTopFeed();
    });

    document.getElementById("openXButton").addEventListener("click", async () => {
      if (!els.draft.value.trim()) generateDraft();
      const button = document.getElementById("openXButton");
      try {
        await navigator.clipboard.writeText(els.draft.value);
        button.textContent = "コピー済み";
        setTimeout(() => button.textContent = "コピーしてX", 1200);
      } catch (error) {
        console.warn("Clipboard copy failed before opening X.", error);
        button.textContent = "コピー失敗";
        setTimeout(() => button.textContent = "コピーしてX", 1200);
      }
      window.open("https://x.com/compose/post", "_blank", "noreferrer");
    });

    setInterval(() => {
      state.seconds -= 1;
      if (state.seconds <= 0) refresh();
      const s = Math.max(0, state.seconds);
      els.countdown.textContent = `次回 ${s >= 60 ? `${Math.ceil(s / 60)}分` : `${s}秒`}`;
    }, 1000);

    refresh();
  </script>
