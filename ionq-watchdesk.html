<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IONQ Watchdesk</title>
  <style>
    :root {
      --bg: #f5f6f3;
      --panel: #ffffff;
      --panel-2: #fbfcfa;
      --line: #d9ded6;
      --text: #17201b;
      --muted: #66736b;
      --accent: #0c756d;
      --accent-soft: #dff2ee;
      --warn: #9b5a00;
      --danger: #a33b3b;
      --ok: #147246;
      --shadow: 0 10px 24px rgba(20, 34, 28, .08);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }

    button, input, textarea { font: inherit; }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    button.ghost { background: var(--panel-2); }
    button:disabled { opacity: .55; cursor: not-allowed; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 230px minmax(420px, 1fr) 380px;
    }

    .side {
      border-right: 1px solid var(--line);
      background: var(--panel-2);
      padding: 14px;
      display: grid;
      align-content: start;
      gap: 14px;
      min-height: 100vh;
    }

    .brand h1 {
      margin: 0 0 4px;
      font-size: 19px;
      letter-spacing: 0;
    }
    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .status-box {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    .tabs {
      display: grid;
      gap: 7px;
    }
    .tab {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      text-align: left;
      min-height: 38px;
    }
    .tab.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      font-weight: 700;
      color: #064d47;
    }
    .count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .side-actions {
      display: grid;
      gap: 7px;
    }

    .main {
      min-width: 0;
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      border-right: 1px solid var(--line);
    }

    .toolbar {
      padding: 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }
    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      min-width: 0;
      background: #fff;
    }

    .feed {
      overflow: auto;
      padding: 10px;
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .priority-box {
      border: 1px solid #d3a64a;
      background: #fffaf0;
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .priority-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: #6f4a00;
      font-weight: 700;
    }
    .priority-list {
      display: grid;
      gap: 7px;
    }

    .item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      display: grid;
      gap: 8px;
    }
    .item.active {
      border-color: var(--accent);
      box-shadow: var(--shadow);
    }
    .item.priority {
      border-color: #dfb757;
      background: #fffdf7;
    }
    .item-title {
      font-weight: 700;
      line-height: 1.42;
      overflow-wrap: anywhere;
    }
    .item-title-original {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }
    .badge {
      border: 1px solid var(--line);
      background: #f8f9f6;
      border-radius: 999px;
      padding: 1px 7px;
    }
    .item-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .posted {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
    }

    .detail {
      min-width: 0;
      height: 100vh;
      background: var(--panel-2);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .detail-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: grid;
      gap: 8px;
    }
    .detail-head h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.42;
      overflow-wrap: anywhere;
    }
    .detail-body {
      overflow: auto;
      padding: 14px;
      display: grid;
      align-content: start;
      gap: 12px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .card h3 {
      margin: 0;
      font-size: 14px;
    }
    .url-box {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8f9f6;
      padding: 9px;
      color: var(--muted);
      overflow-wrap: anywhere;
      font-size: 12px;
    }
    textarea {
      width: 100%;
      min-height: 210px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      resize: vertical;
      line-height: 1.6;
      background: #fff;
      color: var(--text);
    }
    .stack { display: grid; gap: 8px; }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .muted { color: var(--muted); font-size: 12px; }
    .ok { color: var(--ok); font-weight: 700; }
    .warn { color: var(--warn); font-weight: 700; }
    .empty {
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .side, .main, .detail {
        height: auto;
        min-height: auto;
        border-right: 0;
      }
      .side { border-bottom: 1px solid var(--line); }
      .main { border-bottom: 1px solid var(--line); }
      .tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr auto; }
      .toolbar .wide { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="side">
      <div class="brand">
        <h1>IONQ Watchdesk</h1>
        <p>48時間以内の情報収集と投稿元ネタ管理</p>
      </div>
      <div class="status-box">
        <div id="version">version: clean-collector-20260629</div>
        <div id="updated">updated: --</div>
        <div id="endpoint">source: --</div>
        <div id="summary">summary: --</div>
      </div>
      <div class="side-actions">
        <button id="showAll" class="primary">最新ニュースを見る</button>
        <button id="showPosted">投稿済みだけ見る</button>
      </div>
    </aside>

    <section class="main">
      <div class="toolbar">
        <input id="search" class="search wide" type="search" placeholder="ニュース検索">
        <button id="reload" class="primary">更新</button>
        <button id="clearPosted" class="ghost">投稿済みクリア</button>
      </div>
      <div id="feed" class="feed"></div>
    </section>

    <section class="detail">
      <div id="detailHead" class="detail-head">
        <h2>ニュースを選択</h2>
        <div class="muted">記事URLをGPTsへ渡して、深掘りレポートを作る運用に戻します。</div>
      </div>
      <div class="detail-body">
        <div class="card">
          <h3>GPTs用コピー</h3>
          <textarea id="gptsText" readonly>左のニュースを選択してください。</textarea>
          <div class="row">
            <button id="copyGpts" class="primary">GPTs用テキストをコピー</button>
            <button id="openGpts">GPTsを開く</button>
            <button id="copyUrl">URLだけコピー</button>
            <button id="openUrl">元記事を開く</button>
          </div>
          <div id="copyStatus" class="muted">待機中</div>
        </div>

        <div class="card">
          <h3>運用メモ</h3>
          <div class="muted">このサイトは集計が主役。レポート作成はGPTsに任せます。</div>
          <div class="muted">古い記事は自動で落とし、48時間以内の情報だけを表示します。</div>
          <div class="muted">投稿済みチェックは「元ネタに対して投稿したか」を管理するために使います。</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const APP_VERSION = "clean-collector-20260629";
    const PUBLIC_ORIGIN = "https://ionqwatchdesk.netlify.app";
    const GPTS_URL = "https://chatgpt.com/g/g-6a41a5264e6081918db223a3b8a4d808-liang-zi-rehoto";
    const MAX_ITEM_AGE_HOURS = 48;
    const isLocalPreview = location.protocol === "file:" || location.hostname === "127.0.0.1" || location.hostname === "localhost";
    const API = isLocalPreview ? PUBLIC_ORIGIN : "";
    const latestEndpoint = API + "/.netlify/functions/latest-ionq";
    const postedEndpoint = API + "/.netlify/functions/posted";

    const state = {
      items: [],
      posted: new Set(loadLocalPosted()),
      selectedId: "",
      view: "all",
      query: ""
    };

    const el = {
      updated: document.getElementById("updated"),
      endpoint: document.getElementById("endpoint"),
      summary: document.getElementById("summary"),
      showAll: document.getElementById("showAll"),
      showPosted: document.getElementById("showPosted"),
      feed: document.getElementById("feed"),
      search: document.getElementById("search"),
      reload: document.getElementById("reload"),
      clearPosted: document.getElementById("clearPosted"),
      detailHead: document.getElementById("detailHead"),
      gptsText: document.getElementById("gptsText"),
      copyGpts: document.getElementById("copyGpts"),
      openGpts: document.getElementById("openGpts"),
      copyUrl: document.getElementById("copyUrl"),
      openUrl: document.getElementById("openUrl"),
      copyStatus: document.getElementById("copyStatus")
    };

    init();

    function init() {
      document.getElementById("version").textContent = "version: " + APP_VERSION;
      el.endpoint.textContent = "source: " + latestEndpoint;
      bindEvents();
      loadPostedFromServer();
      refresh();
      setInterval(refresh, 60000);
    }

    function bindEvents() {
      el.reload.addEventListener("click", refresh);
      el.search.addEventListener("input", function () {
        state.query = el.search.value.trim().toLowerCase();
        renderFeed();
      });
      el.copyGpts.addEventListener("click", copyGptsText);
      el.openGpts.addEventListener("click", copyAndOpenGpts);
      el.copyUrl.addEventListener("click", copySelectedUrl);
      el.openUrl.addEventListener("click", openSelectedUrl);
      el.clearPosted.addEventListener("click", clearPosted);
      el.showAll.addEventListener("click", function () {
        state.view = "all";
        updateViewButtons();
        renderFeed();
      });
      el.showPosted.addEventListener("click", function () {
        state.view = "posted";
        updateViewButtons();
        renderFeed();
      });
    }

    async function refresh() {
      el.updated.textContent = "updated: loading";
      try {
        const data = await fetchJson(latestEndpoint, 12000);
        const normalized = normalizeLatest(data);
        state.items = normalized.items;
        el.updated.textContent = "updated: " + formatTime(data.updatedAt || new Date().toISOString());
        renderSummary(normalized.stats);
        updateViewButtons();
        renderFeed();
        if (!state.selectedId && state.items.length) selectItem(state.items[0].id);
      } catch (error) {
        el.updated.textContent = "updated: failed";
        el.summary.textContent = "summary: fetch failed";
        el.feed.innerHTML = errorBox("速報取得に失敗しました", error.message, latestEndpoint);
      }
    }

    function normalizeLatest(data) {
      const rows = [];
      addRows(rows, data.officialNews, "ir", "最新IR", "IR");
      addRows(rows, data.sec, "sec", "重要SEC", "SEC");
      addRows(rows, data.marketNews, "news", "IONQ NEWS", "NEWS");
      addRows(rows, data.quantumNews, "quantum", "量子業界", "QNEWS");
      addRows(rows, data.competitorSec, "competitor", "競合SEC", "CSEC");
      addRows(rows, data.competitorNews, "competitor", "競合NEWS", "CNEWS");
      const valid = rows.filter(function (item) { return item.title || item.url; });
      const fresh = valid.filter(function (item) { return isFreshItem(item); });
      return {
        items: fresh
        .sort(function (a, b) {
          return Date.parse(b.publishedAt || b.acceptedAt || 0) - Date.parse(a.publishedAt || a.acceptedAt || 0);
        }),
        stats: buildStats(valid, fresh)
      };
    }

    function addRows(rows, list, category, label, type) {
      (list || []).forEach(function (raw) {
        const title = raw.title || [raw.ticker, raw.form, raw.description].filter(Boolean).join(" ");
        const source = raw.source || raw.companyName || raw.ticker || label;
        const publishedAt = raw.publishedAt || raw.acceptedAt || raw.filingDate || raw.reportDate || "";
        const url = raw.url || "";
        const id = stableId([type, title, source, url, publishedAt, raw.accessionNumber].join("|"));
        rows.push(Object.assign({}, raw, {
          id: id,
          category: category,
          label: label,
          type: type,
          title: title,
          titleJa: raw.titleJa || raw.translatedTitle || "",
          source: source,
          publishedAt: publishedAt,
          url: url
        }));
      });
    }

    function updateViewButtons() {
      el.showAll.className = state.view === "all" ? "primary" : "";
      el.showPosted.className = state.view === "posted" ? "primary" : "";
      el.showPosted.textContent = "投稿済みだけ見る (" + countPosted() + ")";
    }

    function countPosted() {
      return state.items.filter(function (item) { return state.posted.has(item.id); }).length;
    }

    function buildStats(valid, fresh) {
      const stats = {
        total: valid.length,
        fresh: fresh.length,
        old: Math.max(0, valid.length - fresh.length),
        byCategory: {}
      };
      valid.forEach(function (item) {
        if (!stats.byCategory[item.category]) {
          stats.byCategory[item.category] = { total: 0, fresh: 0 };
        }
        stats.byCategory[item.category].total += 1;
      });
      fresh.forEach(function (item) {
        if (!stats.byCategory[item.category]) {
          stats.byCategory[item.category] = { total: 0, fresh: 0 };
        }
        stats.byCategory[item.category].fresh += 1;
      });
      return stats;
    }

    function renderSummary(stats) {
      if (!stats) {
        el.summary.textContent = "summary: --";
        return;
      }
      const parts = [
        "取得 " + stats.total + "件",
        "48h " + stats.fresh + "件",
        "除外 " + stats.old + "件"
      ];
      el.summary.textContent = "summary: " + parts.join(" / ");
    }

    function renderFeed() {
      const items = filteredItems();
      const priorityItems = state.items
        .filter(function (item) { return isMarketMovingCandidate(item) && !state.posted.has(item.id); })
        .slice(0, 5);

      el.feed.innerHTML = "";
      appendPriorityBox(priorityItems);

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = [
          "<div>48時間以内の表示対象ニュースはありません。</div>",
          "<div class=\"muted\">左の summary が「取得あり / 48h 0件」なら、取得は成功して古い記事だけが除外されています。</div>"
        ].join("");
        el.feed.appendChild(empty);
        return;
      }

      items.forEach(function (item) { appendItemCard(el.feed, item, false); });
    }

    function appendPriorityBox(priorityItems) {
      if (!priorityItems.length) return;
      const box = document.createElement("section");
      box.className = "priority-box";
      box.innerHTML = [
        "<div class=\"priority-head\"><span>投稿優先ニュース</span><span class=\"count\">" + priorityItems.length + "</span></div>",
        "<div class=\"priority-list\"></div>"
      ].join("");
      const list = box.querySelector(".priority-list");
      priorityItems.forEach(function (item) { appendItemCard(list, item, true); });
      el.feed.appendChild(box);
    }

    function appendItemCard(parent, item, priority) {
      const card = document.createElement("article");
      card.className = "item" + (priority ? " priority" : "") + (item.id === state.selectedId ? " active" : "");
      card.innerHTML = [
        "<div class=\"item-title\">" + escapeHtml(displayTitle(item)) + "</div>",
        item.titleJa ? "<div class=\"item-title-original\">" + escapeHtml(item.title) + "</div>" : "",
        "<div class=\"meta\">",
        "<span class=\"badge\">" + escapeHtml(item.label) + "</span>",
        renderSignalBadges(item),
        item.form ? "<span class=\"badge\">" + escapeHtml(item.form) + "</span>" : "",
        "<span>" + escapeHtml(item.source || "") + "</span>",
        "<span>" + escapeHtml(formatTime(item.publishedAt)) + "</span>",
        "</div>",
        "<div class=\"item-actions\">",
        "<label class=\"posted\"><input type=\"checkbox\" " + (state.posted.has(item.id) ? "checked" : "") + ">投稿済み</label>",
        "<div class=\"row\"><button type=\"button\" data-act=\"open-gpts\" class=\"primary\">GPTs\u3092\u958b\u304f</button><button type=\"button\" data-act=\"select\">\u9078\u629e</button></div>",
        "</div>"
      ].join("");

      card.querySelector("[data-act='select']").addEventListener("click", function () { selectItem(item.id); });
      card.querySelector("[data-act='open-gpts']").addEventListener("click", function () {
        selectItem(item.id);
        copyAndOpenGpts();
      });
      card.querySelector("input").addEventListener("change", function (event) {
        setPosted(item.id, event.target.checked);
      });
      card.addEventListener("dblclick", function () { selectItem(item.id); });
      parent.appendChild(card);
    }

    function filteredItems() {
      return state.items.filter(function (item) {
        if (state.view === "posted" && !state.posted.has(item.id)) return false;
        if (!state.query) return true;
        return [item.title, item.titleJa, item.source, item.label, item.form, item.ticker].join(" ").toLowerCase().includes(state.query);
      });
    }

    function selectItem(id) {
      const item = findItem(id);
      if (!item) return;
      state.selectedId = id;
      el.detailHead.innerHTML = [
        "<h2>" + escapeHtml(displayTitle(item)) + "</h2>",
        item.titleJa ? "<div class=\"item-title-original\">" + escapeHtml(item.title) + "</div>" : "",
        "<div class=\"meta\">",
        "<span class=\"badge\">" + escapeHtml(item.label) + "</span>",
        renderSignalBadges(item),
        item.form ? "<span class=\"badge\">" + escapeHtml(item.form) + "</span>" : "",
        "<span>" + escapeHtml(item.source || "") + "</span>",
        "<span>" + escapeHtml(formatTime(item.publishedAt)) + "</span>",
        "</div>",
        item.url ? "<div class=\"url-box\">" + escapeHtml(item.url) + "</div>" : "<div class=\"warn\">URLなし</div>"
      ].join("");
      el.gptsText.value = buildGptsText(item);
      el.copyStatus.textContent = "選択中";
      renderFeed();
    }

    function displayTitle(item) {
      return item.titleJa || item.title || "";
    }

    function buildGptsText(item) {
      return [
        item.url || "",
        "title: " + (item.title || ""),
        "source: " + (item.source || ""),
        "type: " + (item.label || item.type || "")
      ].filter(Boolean).join("\n");
    }

    async function copyGptsText() {
      const item = selectedItem();
      if (!item) return;
      await copyText(buildGptsText(item));
      el.copyStatus.innerHTML = "<span class=\"ok\">GPTs用テキストをコピーしました</span>";
    }

    async function copyAndOpenGpts() {
      const item = selectedItem();
      if (!item) return;
      await copyText(buildGptsText(item));
      el.copyStatus.innerHTML = "<span class=\"ok\">GPTs用テキストをコピーしてChatGPTを開きました</span>";
      window.open(GPTS_URL, "_blank", "noopener,noreferrer");
    }
    async function copySelectedUrl() {
      const item = selectedItem();
      if (!item) return;
      await copyText(item.url || "");
      el.copyStatus.innerHTML = "<span class=\"ok\">URLをコピーしました</span>";
    }

    function openSelectedUrl() {
      const item = selectedItem();
      if (!item || !item.url) return;
      window.open(item.url, "_blank", "noopener,noreferrer");
    }

    function selectedItem() {
      const item = findItem(state.selectedId);
      if (!item) {
        el.copyStatus.innerHTML = "<span class=\"warn\">先にニュースを選択してください</span>";
        return null;
      }
      if (!item.url) {
        el.copyStatus.innerHTML = "<span class=\"warn\">このニュースにはURLがありません</span>";
        return null;
      }
      return item;
    }

    function findItem(id) {
      return state.items.find(function (item) { return item.id === id; });
    }

    async function loadPostedFromServer() {
      try {
        const data = await fetchJson(postedEndpoint, 8000);
        if (data.ok && Array.isArray(data.ids)) {
          data.ids.forEach(function (id) { state.posted.add(id); });
          saveLocalPosted();
          updateViewButtons();
          renderFeed();
        }
      } catch (error) {
        // Local state is enough if shared state is unavailable.
      }
    }

    async function setPosted(id, posted) {
      if (posted) state.posted.add(id);
      else state.posted.delete(id);
      saveLocalPosted();
      updateViewButtons();
      renderFeed();
      try {
        await fetch(postedEndpoint, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ id: id, posted: posted })
        });
      } catch (error) {
        // Keep local state.
      }
    }

    function clearPosted() {
      state.posted.clear();
      saveLocalPosted();
      updateViewButtons();
      renderFeed();
    }

    async function fetchJson(url, timeoutMs) {
      const response = await fetchWithTimeout(url, { cache: "no-store" }, timeoutMs);
      const text = await response.text();
      if (!response.ok) throw new Error("HTTP " + response.status + ": " + text.slice(0, 120));
      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error("JSONではない応答: " + text.slice(0, 120));
      }
    }

    async function fetchWithTimeout(url, options, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(function () { controller.abort(); }, timeoutMs);
      try {
        return await fetch(url, Object.assign({}, options || {}, { signal: controller.signal }));
      } catch (error) {
        if (error.name === "AbortError") throw new Error("タイムアウト: " + url);
        throw error;
      } finally {
        clearTimeout(timer);
      }
    }

    async function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const area = document.createElement("textarea");
      area.value = text;
      document.body.appendChild(area);
      area.select();
      document.execCommand("copy");
      area.remove();
    }

    function loadLocalPosted() {
      try {
        const parsed = JSON.parse(localStorage.getItem("ionq-collector-posted") || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function saveLocalPosted() {
      localStorage.setItem("ionq-collector-posted", JSON.stringify(Array.from(state.posted).slice(-1000)));
    }

    function stableId(value) {
      let hash = 2166136261;
      const text = String(value || "");
      for (let i = 0; i < text.length; i += 1) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return "i" + (hash >>> 0).toString(16);
    }

    function isFreshItem(item) {
      const value = item.publishedAt || item.acceptedAt || item.filingDate || item.reportDate || "";
      const ms = Date.parse(value);
      if (!Number.isFinite(ms)) return true;
      return Date.now() - ms <= MAX_ITEM_AGE_HOURS * 60 * 60 * 1000;
    }

    function signalText(item) {
      return [
        item.title,
        item.source,
        item.label,
        item.form,
        item.description,
        item.companyName,
        item.ticker
      ].join(" ").toLowerCase();
    }

    function getSignalBadges(item) {
      const text = signalText(item);
      const badges = [];
      const form = String(item.form || "").toUpperCase();

      if (isMarketMovingCandidate(item)) badges.push("株価材料");
      if (/breakthrough|logical qubit|error correction|fault tolerant|quantum advantage|qubit|qpu|fidelity|gate|ion trap|trapped ion|superconducting|photonic|laser|amplifier|cryogenic|modular|algorithm/.test(text)) badges.push("技術材料");
      if (/contract|award|deal|order|booking|bookings|backlog|partnership|strategic|collaboration|customer|deployment|government|defense|commercial|production|data center/.test(text)) badges.push("事業材料");
      if (/funding|raises|raised|financing|offering|convertible|cash|debt|equity|acquisition|merger|investment|institutional investor|hedge fund|asset manager|etf|holdings|stake|portfolio/.test(text)) badges.push("資金材料");
      if (/^(8-K|10-Q|10-K|S-3|424B|13D|13G|SC 13|DEF 14A)/.test(form) || item.category === "sec" || item.category === "competitor") badges.push("SEC/開示");
      if (!badges.length && item.category === "quantum") badges.push("業界材料");
      if (!badges.length && item.category === "news") badges.push("ニュース");

      return Array.from(new Set(badges)).slice(0, 3);
    }

    function renderSignalBadges(item) {
      return getSignalBadges(item).map(function (label) {
        return "<span class=\"badge signal\">" + escapeHtml(label) + "</span>";
      }).join("");
    }

    function isMarketMovingCandidate(item) {
      const text = signalText(item);

      if (!text.trim()) return false;

      const form = String(item.form || "").toUpperCase();
      if (/^(8-K|10-Q|10-K|S-3|424B|13D|13G|SC 13|DEF 14A)/.test(form)) return true;

      const strongKeywords = [
        "earnings", "revenue", "guidance", "results", "quarterly", "annual",
        "contract", "award", "deal", "order", "booking", "bookings", "backlog",
        "partnership", "strategic", "collaboration", "customer", "deployment",
        "government", "defense", "army", "navy", "air force", "darpa", "doe", "nasa",
        "funding", "raises", "raised", "financing", "offering", "convertible",
        "acquisition", "merger", "buyout", "investment",
        "analyst", "upgrade", "downgrade", "price target", "rating", "institutional investor", "hedge fund", "asset manager", "etf", "holdings", "stake", "portfolio",
        "breakthrough", "logical qubit", "error correction", "fault tolerant",
        "quantum advantage", "commercial", "production", "data center"
      ];

      const quantumTickers = [
        "$ionq", "ionq", "$rgti", "rigetti", "$qbts", "d-wave", "$qubt",
        "quantinuum", "ibm quantum", "google quantum", "microsoft quantum",
        "aws braket", "nvidia quantum"
      ];

      const hasStrong = strongKeywords.some(function (word) { return text.includes(word); });
      const hasTicker = quantumTickers.some(function (word) { return text.includes(word); });

      if (hasStrong && hasTicker) return true;
      if (item.category === "ir" || item.category === "sec" || item.category === "competitor") return hasStrong || hasTicker;
      return hasStrong && /quantum|qubit|qpu|ion trap|trapped ion|superconducting|photonic/.test(text);
    }

    function formatTime(value) {
      if (!value) return "";
      const ms = Date.parse(value);
      if (!Number.isFinite(ms)) return String(value).slice(0, 16);
      return new Intl.DateTimeFormat("ja-JP", {
        timeZone: "Asia/Tokyo",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(ms));
    }

    function errorBox(title, message, url) {
      return [
        "<div class=\"empty\">",
        "<div class=\"warn\">" + escapeHtml(title) + "</div>",
        "<div>" + escapeHtml(message || "") + "</div>",
        "<div class=\"muted\">" + escapeHtml(url || "") + "</div>",
        "</div>"
      ].join("");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</body>
