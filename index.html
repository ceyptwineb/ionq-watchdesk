<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IONQ Watchdesk</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #fff;
      --ink: #18202a;
      --muted: #647080;
      --line: #d9dee6;
      --blue: #2458c6;
      --green: #16845b;
      --red: #bd3d43;
      --amber: #a56a13;
      --violet: #7047a8;
      --dark: #17202b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Segoe UI", "Noto Sans JP", system-ui, sans-serif;
    }

    button, select, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }

    .shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 16px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 4px 0 14px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      color: #fff;
      background: var(--dark);
      font-weight: 800;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 19px; }
    h2 { font-size: 16px; }
    h3 { font-size: 14px; line-height: 1.45; }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--green);
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .icon-btn, .btn {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 7px 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn.primary {
      color: #fff;
      border-color: var(--blue);
      background: var(--blue);
    }

    .btn.dark {
      color: #fff;
      border-color: var(--dark);
      background: var(--dark);
    }

    .headline {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      padding: 16px 0 10px;
    }

    .headline p {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .feeds {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      align-items: start;
    }

    .lane {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .lane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 43px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .lane[data-type="IR"] .lane-head { border-top: 3px solid var(--blue); }
    .lane[data-type="SEC"] .lane-head { border-top: 3px solid var(--red); }
    .lane[data-type="NEWS"] .lane-head { border-top: 3px solid var(--amber); }
    .lane[data-type="X"] .lane-head { border-top: 3px solid var(--violet); }

    .count {
      color: var(--muted);
      font-size: 11px;
    }

    .lane-list {
      display: grid;
      max-height: 440px;
      overflow: auto;
    }

    .story {
      border-bottom: 1px solid #edf0f4;
      background: #fff;
      min-height: 96px;
      display: grid;
      width: 100%;
      color: var(--ink);
    }

    .story:hover, .story.selected { background: #f0f5ff; }
    .story.posted { opacity: .5; }

    .story-main {
      appearance: none;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 11px 12px 7px;
      display: grid;
      gap: 6px;
      width: 100%;
      color: var(--ink);
    }

    .story-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .story-title {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 650;
    }

    .feed-posted {
      margin: 0 10px 9px auto;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
    }

    .feed-posted input { width: 15px; height: 15px; margin: 0; }

    .empty {
      padding: 18px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .composer {
      display: grid;
      grid-template-columns: minmax(280px, .72fr) minmax(0, 1.28fr);
      gap: 12px;
      margin-top: 14px;
    }

    .controls, .draft {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
    }

    .controls { display: grid; gap: 12px; align-content: start; }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
    }

    select { min-height: 40px; }

    .selected-story {
      border-left: 3px solid var(--blue);
      padding: 9px 10px;
      background: #f7f9fc;
      min-height: 74px;
    }

    .selected-story span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 4px;
    }

    .control-actions, .draft-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .draft {
      color: #f4f7fb;
      background: var(--dark);
      border-color: var(--dark);
      display: grid;
      gap: 10px;
    }

    .draft-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .draft-head span { color: #aeb8c5; font-size: 12px; }

    textarea#draftText {
      min-height: 255px;
      resize: vertical;
      color: #f8fafc;
      border-color: #3a4654;
      background: #111821;
      line-height: 1.55;
    }

    .draft .btn { border-color: #485563; background: #24303d; color: #fff; }
    .draft .btn.primary { border-color: #4e78e8; background: #315fcf; }

    .posted-check {
      min-height: 36px;
      margin: 0;
      padding: 7px 10px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid #485563;
      border-radius: 7px;
      color: #fff;
      background: #24303d;
      cursor: pointer;
    }

    .posted-check input { width: 17px; height: 17px; margin: 0; }

    .error {
      display: none;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #edb6ba;
      border-radius: 7px;
      color: #8f272e;
      background: #fff4f4;
      font-size: 12px;
    }

    @media (max-width: 1100px) {
      .feeds { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 700px) {
      .shell { padding: 10px; }
      header, .headline { align-items: flex-start; }
      header { flex-direction: column; }
      .status { justify-content: flex-start; }
      .feeds, .composer { grid-template-columns: 1fr; }
      .lane-list { max-height: 310px; }
      textarea#draftText { min-height: 220px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="brand">
        <div class="mark">IQ</div>
        <div>
          <h1>IONQ Watchdesk</h1>
          <p>速報・一次情報・投稿作成</p>
        </div>
      </div>
      <div class="status">
        <span class="live"><i class="dot"></i>自動更新中</span>
        <span id="lastUpdated">未更新</span>
        <span id="countdown">次回 60秒</span>
        <button class="icon-btn" id="refreshButton" type="button">更新</button>
      </div>
    </header>

    <div class="headline">
      <div>
        <h2>最新速報</h2>
        <p>カードを選ぶと投稿作成欄へ送られます</p>
      </div>
    </div>

    <main class="feeds" id="feeds">
      <section class="lane" data-type="IR">
        <div class="lane-head"><h2>最新IR</h2><span class="count" id="countIR">0件</span></div>
        <div class="lane-list" id="feedIR"><div class="empty">取得中...</div></div>
      </section>
      <section class="lane" data-type="SEC">
        <div class="lane-head"><h2>重要SEC</h2><span class="count" id="countSEC">0件</span></div>
        <div class="lane-list" id="feedSEC"><div class="empty">取得中...</div></div>
      </section>
      <section class="lane" data-type="NEWS">
        <div class="lane-head"><h2>NEWS</h2><span class="count" id="countNEWS">0件</span></div>
        <div class="lane-list" id="feedNEWS"><div class="empty">取得中...</div></div>
      </section>
      <section class="lane" data-type="X">
        <div class="lane-head"><h2>公式X</h2><span class="count" id="countX">0件</span></div>
        <div class="lane-list" id="feedX"><div class="empty">取得中...</div></div>
      </section>
    </main>

    <div class="error" id="errorBox"></div>

    <section class="composer">
      <div class="controls">
        <h2>投稿作成</h2>
        <div>
          <label>選択中</label>
          <div class="selected-story" id="selectedStory">最新情報を取得しています</div>
        </div>
        <div class="control-actions">
          <button class="btn primary" id="generateButton" type="button">投稿案を作成</button>
          <button class="btn" id="openSourceButton" type="button">出典を開く</button>
        </div>
      </div>

      <div class="draft">
        <div class="draft-head">
          <h2>投稿案</h2>
          <span id="charCount">0 / 200</span>
        </div>
        <textarea id="draftText" aria-label="投稿案" placeholder="情報を選んで投稿案を作成"></textarea>
        <div class="draft-actions">
          <button class="btn" id="copyButton" type="button">コピー</button>
          <label class="posted-check"><input id="postedCheck" type="checkbox"> 投稿済み</label>
          <button class="btn primary" id="openXButton" type="button">X投稿画面</button>
        </div>
      </div>
    </section>
  </div>

  <script>
    const PUBLIC_API = "https://dynamic-praline-de62f0.netlify.app/.netlify/functions/latest-ionq";
    const LOCAL_VIEW = location.protocol === "file:" || ["localhost", "127.0.0.1"].includes(location.hostname);
    const API_URL = LOCAL_VIEW ? PUBLIC_API : "/.netlify/functions/latest-ionq";
    const REFRESH_SECONDS = 60;
    const state = {
      entries: { IR: [], SEC: [], NEWS: [], X: [] },
      selected: null,
      seconds: REFRESH_SECONDS,
      xStatus: "manual",
      posted: new Set(JSON.parse(localStorage.getItem("ionq_posted_v2") || "[]"))
    };

    const els = {
      lastUpdated: document.getElementById("lastUpdated"),
      countdown: document.getElementById("countdown"),
      error: document.getElementById("errorBox"),
      selected: document.getElementById("selectedStory"),
      draft: document.getElementById("draftText"),
      charCount: document.getElementById("charCount"),
      postedCheck: document.getElementById("postedCheck")
    };

    function importantSec(item) {
      const form = String(item.form || "").toUpperCase();
      const description = String(item.description || "").toUpperCase();
      if (["3", "4", "5", "144"].includes(form)) return false;
      if (description.includes("OWNERSHIP")) return false;
      return /8-K|10-Q|10-K|S-3|424B|DEF 14A|PRE 14A|SC 13|13D|13G/.test(form) ||
        /PROSPECTUS|CURRENT REPORT|QUARTERLY|ANNUAL/.test(description);
    }

    function itemId(item) {
      return encodeURIComponent(`${item.type}|${item.url || ""}|${item.title || ""}`).slice(0, 500);
    }

    function normalize(data) {
      state.entries.IR = (data.officialNews || []).map(item => ({
        ...item, type: "IR", confidence: "一次情報候補", source: item.source || "IonQ IR"
      }));

      state.entries.SEC = (data.sec || []).filter(importantSec).map(item => ({
        ...item, type: "SEC", title: `${item.form}｜${secLabel(item)}`, source: "SEC EDGAR", confidence: "一次情報",
        publishedAt: item.acceptedAt || item.filingDate
      }));

      state.entries.NEWS = (data.marketNews || []).map(item => ({
        ...item, type: "NEWS", confidence: "報道", source: item.source || "News"
      }));

      state.entries.X = [];
      state.xStatus = "manual";
    }

    function secLabel(item) {
      const form = String(item.form || "").toUpperCase();
      if (form === "8-K") return "臨時重要開示";
      if (form === "10-Q") return "四半期報告書";
      if (form === "10-K") return "年次報告書";
      if (form.includes("S-3") || form.includes("424B")) return "資金調達・目論見書";
      if (form.includes("13D") || form.includes("13G") || form.includes("SC 13")) return "大口保有報告";
      return item.description || "SEC開示";
    }

    function renderAll() {
      ["IR", "SEC", "NEWS", "X"].forEach(type => renderLane(type));
      if (!state.selected) selectLatest("IR");
    }

    function renderLane(type) {
      const list = document.getElementById(`feed${type}`);
      const entries = state.entries[type].slice(0, 8);
      document.getElementById(`count${type}`).textContent = type === "X" ? "無料" : `${entries.length}件`;

      if (!entries.length) {
        const message = type === "X" ? xStatusMessage() : "該当する最新情報はありません";
        list.innerHTML = `<div class="empty">${message}</div>`;
        return;
      }

      list.innerHTML = entries.map(item => {
        const id = itemId(item);
        const selected = state.selected && itemId(state.selected) === id;
        return `<article class="story ${selected ? "selected" : ""} ${state.posted.has(id) ? "posted" : ""}">
          <button class="story-main" data-entry="${id}" type="button">
            <span class="story-meta"><span>${escapeHtml(item.source)}</span><span>${formatDate(item.publishedAt || item.filingDate)}</span></span>
            <span class="story-title">${escapeHtml(item.title)}</span>
          </button>
          <label class="feed-posted"><input type="checkbox" data-feed-posted="${id}" ${state.posted.has(id) ? "checked" : ""}> 投稿済み</label>
        </article>`;
      }).join("");

      list.querySelectorAll("[data-entry]").forEach(button => {
        button.addEventListener("click", () => {
          const item = state.entries[type].find(candidate => itemId(candidate) === button.dataset.entry);
          if (item) selectItem(item);
        });
      });

      list.querySelectorAll("[data-feed-posted]").forEach(checkbox => {
        checkbox.addEventListener("change", () => {
          const id = checkbox.dataset.feedPosted;
          if (checkbox.checked) state.posted.add(id);
          else state.posted.delete(id);
          localStorage.setItem("ionq_posted_v2", JSON.stringify([...state.posted]));
          if (state.selected && itemId(state.selected) === id) els.postedCheck.checked = checkbox.checked;
          renderLane(type);
        });
      });
    }

    function xStatusMessage() {
      const listUrl = "https://x.com/i/lists/2068093425489264980";
      return `<a href="${listUrl}" target="_blank" rel="noreferrer">選定Xリストを開く</a><br><small>無料・X上で確認</small>`;
    }

    function selectLatest(type) {
      const item = state.entries[type][0] || ["IR", "SEC", "NEWS", "X"].flatMap(key => state.entries[key])[0];
      if (item) selectItem(item);
    }

    function selectItem(item) {
      state.selected = item;
      els.selected.innerHTML = `<strong>${escapeHtml(shortTitle(item.title, 90))}</strong><span>${escapeHtml(item.source)} / ${item.confidence}</span>`;
      els.postedCheck.checked = state.posted.has(itemId(item));
      ["IR", "SEC", "NEWS", "X"].forEach(renderLane);
    }

    function generateDraft() {
      if (!state.selected) return;
      els.draft.value = buildDraft(state.selected, state.selected.type);
      updateCount();
    }

    function buildDraft(item, priority) {
      const view = analyze(item, priority);
      const draft = `【IONQ｜${view.label}】\n${view.lead}\n\n${view.body}\n注目：${view.watch}\n\n出典：${shortSource(item)}`;
      return fit200(draft);
    }

    function analyze(item, priority) {
      const title = cleanTitle(item.title);
      const text = `${title} ${item.description || ""}`.toLowerCase();
      const source = shortSource(item);
      if (priority === "SEC") return analyzeSec(item);
      const official = priority === "IR";
      const subject = official ? "IonQが" : `${source}が`;

      if (/should investors choose ionq|better.*stock|ionq.*(?:vs\.?|versus)|(?:vs\.?|versus).*ionq|choose ionq|buy.*ionq|ionq.*buy/.test(text)) return {
        label: "投資比較",
        lead: `${source}が、IonQを他の量子関連銘柄より選ぶべきかを比較。`,
        body: "焦点は技術力や提携実績だけでなく、売上規模、赤字、高い企業評価に見合う成長を示せるか。",
        watch: "比較対象、評価の前提、記事の最終結論。"
      };
      if (/acquisition|acquire|merger|買収|合併/.test(text)) return {
        label: "M&A",
        lead: `${subject}${quoteTitle(title)}を${official ? "発表" : "報道"}。`,
        body: "技術・人材・顧客基盤の獲得につながる一方、買収額と統合効果が企業価値を左右する。",
        watch: "買収額、対象技術、完了時期、業績への寄与。"
      };
      if (/contract|agreement|partnership|collaboration|提携|契約|採用|導入/.test(text)) return {
        label: "提携・契約",
        lead: `${subject}${quoteTitle(title)}を${official ? "発表" : "報道"}。`,
        body: "研究発表ではなく、顧客・売上・実利用へつながる契約かどうかが評価の分かれ目。",
        watch: "相手先、契約額、期間、実証か本契約か。"
      };
      if (/earnings|revenue|guidance|backlog|results|決算|売上|受注/.test(text)) return {
        label: "業績",
        lead: `${subject}${quoteTitle(title)}を${official ? "発表" : "報道"}。`,
        body: "量子技術への期待を、売上成長・受注残・資金余力という実際の数字で検証する材料。",
        watch: "売上、受注残、現金、赤字、株式希薄化。"
      };
      if (/stock.*(?:fall|drop|down|plunge|slide)|why.*fall|shares.*(?:fall|drop)|下落|急落/.test(text)) return {
        label: "株価",
        lead: `${source}がIonQ株の下落要因を報道。${signalFromTitle(title)}`.trim(),
        body: "材料そのものと短期的な需給を分け、事業価値を変える事実があるかを見極めたい。",
        watch: "下落率、直接の材料、出来高、一次情報との整合。"
      };
      if (/stock.*(?:rise|gain|jump|pop|surge|soar)|shares.*(?:rise|gain|jump|soar)|上昇|急騰/.test(text)) return {
        label: "株価",
        lead: `${source}がIonQ株の上昇要因を報道。${signalFromTitle(title)}`.trim(),
        body: "期待先行の値動きか、売上や商用化を押し上げる新事実が伴うかが重要。",
        watch: "上昇率、直接の材料、出来高、発表元。"
      };
      if (/government|darpa|defense|federal|政府|国防|安全保障/.test(text)) return {
        label: "政府案件",
        lead: `${subject}${quoteTitle(title)}を${official ? "発表" : "報道"}。`,
        body: "政府・国防需要への接続は信頼性の裏付けになるが、実際の契約規模とIonQの担当範囲が重要。",
        watch: "機関名、予算、契約期間、主契約者か。"
      };
      if (/roadmap|qubit|fidelity|hardware|network|技術|量子ビット|精度/.test(text)) return {
        label: "技術",
        lead: `${subject}${quoteTitle(title)}を${official ? "発表" : "報道"}。`,
        body: "性能向上が商用利用へ直結するか、目標ではなく実測値と提供時期で判断したい。",
        watch: "実績か計画か、性能指標、競合差、提供時期。"
      };
      if (/analyst|price target|rating|upgrade|downgrade|目標株価|格付け/.test(text)) return {
        label: "市場評価",
        lead: `${source}が${quoteTitle(title)}を報道。`,
        body: "評価変更の根拠が業績見通しの変化なのか、株価水準だけの判断なのかを分けて見る必要がある。",
        watch: "評価会社、目標株価、変更理由、前提数字。"
      };

      return {
        label: official ? "公式発表" : "NEWS",
        lead: `${subject}${quoteTitle(title)}を${official ? "発表" : "報道"}。`,
        body: official
          ? "IonQ自身の発表として、商用化・売上・技術優位性のどこに影響する内容かを確認したい。"
          : "見出しだけで判断せず、IonQの売上・競争力・資金面を実際に変える新事実が含まれるかが重要。",
        watch: official ? "発表主体、具体的な数字、実施時期。" : "一次情報、具体的な数字、記事の結論。"
      };
    }

    function analyzeSec(item) {
      const form = String(item.form || "").toUpperCase();
      if (form === "8-K") return { label: "SEC 8-K", lead: "IonQが臨時重要報告書8-KをSECへ提出。", body: "契約、資金調達、経営変更など、株価へ直結し得る事実が含まれる一次情報。", watch: "Item番号、金額、発効日、添付資料。" };
      if (form === "10-Q") return { label: "SEC 10-Q", lead: "IonQが四半期報告書10-QをSECへ提出。", body: "期待ではなく、売上・受注・資金余力から事業の進捗を検証できる重要資料。", watch: "売上、受注残、現金、赤字、希薄化。" };
      if (form === "10-K") return { label: "SEC 10-K", lead: "IonQが年次報告書10-KをSECへ提出。", body: "通期実績と事業リスクを通じ、長期成長ストーリーと現状の差を確認できる。", watch: "成長率、現金、主要リスク、発行株式数。" };
      if (form.includes("S-3") || form.includes("424B")) return { label: "資金調達", lead: `IonQが${form}をSECへ提出。`, body: "開発資金の確保につながる一方、新株発行なら既存株主の希薄化要因になる。", watch: "発行額、資金使途、発行済みか登録のみか。" };
      if (/13D|13G/.test(form)) return { label: "大口保有", lead: `IonQ株に関する${form}がSECへ提出。`, body: "大株主の保有状況や保有目的の変化を示す開示。売買の方向と提出者を確認したい。", watch: "提出者、保有比率、増減、保有目的。" };
      return { label: "SEC", lead: `IonQが${form || "重要書類"}をSECへ提出。`, body: "報道より優先して確認すべき一次情報。内容と数字を本文で確かめたい。", watch: "フォーム、提出理由、具体的な数字、添付資料。" };
    }

    function cleanTitle(title) {
      return String(title || "IONQ関連情報")
        .replace(/\s+-\s+[^-]+$/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function quoteTitle(title) {
      return `「${shortTitle(title, 72)}」`;
    }

    function signalFromTitle(title) {
      const percent = title.match(/\b\d+(?:\.\d+)?%/);
      return percent ? `見出しでは${percent[0]}の値動きに言及。` : "";
    }

    function shortTitle(title, max) {
      const clean = String(title || "IONQ関連情報").replace(/\s+-\s+[^-]+$/g, "").replace(/\s+/g, " ").trim();
      return clean.length > max ? `${clean.slice(0, max - 1)}…` : clean;
    }

    function shortSource(item) {
      if (item.type === "SEC") return `SEC EDGAR（${item.form || "提出書類"}）`;
      return shortTitle(String(item.source || item.type).replace(/^@/, "@"), 28);
    }

    function fit200(text) {
      if (text.length <= 200) return text;
      const lines = text.split("\n");
      const source = lines.pop();
      while (lines.length && !lines[lines.length - 1].trim()) lines.pop();
      const suffix = `\n\n${source}`;
      const limit = Math.max(1, 199 - suffix.length);
      return `${lines.join("\n").slice(0, limit).trimEnd()}…${suffix}`;
    }

    function formatDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value || "";
      return date.toLocaleString("ja-JP", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char]);
    }

    function updateCount() {
      const count = els.draft.value.length;
      els.charCount.textContent = `${count} / 200`;
      els.charCount.style.color = count > 200 ? "#ff8990" : "#aeb8c5";
    }

    async function refresh() {
      document.getElementById("refreshButton").disabled = true;
      els.error.style.display = "none";
      try {
        const response = await fetch(API_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`取得失敗 ${response.status}`);
        const data = await response.json();
        if (data.error) throw new Error(data.message || data.error);
        normalize(data);
        renderAll();
        els.lastUpdated.textContent = `更新 ${formatDate(data.updatedAt || new Date())}`;
        state.seconds = REFRESH_SECONDS;
      } catch (error) {
        els.error.textContent = `最新情報を取得できません: ${error.message}`;
        els.error.style.display = "block";
      } finally {
        document.getElementById("refreshButton").disabled = false;
      }
    }

    document.getElementById("refreshButton").addEventListener("click", refresh);
    document.getElementById("generateButton").addEventListener("click", generateDraft);
    els.draft.addEventListener("input", updateCount);

    document.getElementById("openSourceButton").addEventListener("click", () => {
      if (state.selected?.url) window.open(state.selected.url, "_blank", "noreferrer");
    });

    document.getElementById("copyButton").addEventListener("click", async () => {
      await navigator.clipboard.writeText(els.draft.value);
      document.getElementById("copyButton").textContent = "コピー済み";
      setTimeout(() => document.getElementById("copyButton").textContent = "コピー", 1000);
    });

    els.postedCheck.addEventListener("change", () => {
      if (!state.selected) return;
      const id = itemId(state.selected);
      if (els.postedCheck.checked) state.posted.add(id);
      else state.posted.delete(id);
      localStorage.setItem("ionq_posted_v2", JSON.stringify([...state.posted]));
      renderLane(state.selected.type);
    });

    document.getElementById("openXButton").addEventListener("click", () => {
      if (!els.draft.value.trim()) generateDraft();
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(els.draft.value)}`, "_blank", "noreferrer");
    });

    setInterval(() => {
      state.seconds -= 1;
      if (state.seconds <= 0) refresh();
      els.countdown.textContent = `次回 ${Math.max(0, state.seconds)}秒`;
    }, 1000);

    refresh();
  </script>
</body>
</html>
